<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Good Green | Checkout</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
</head>
<body class="checkout-body">

<header>
    <nav class="navbar">
        <div class="container">
            <div class="logo-area">
                <a href="index.html">
                    <img src="images/longlogo.png" alt="The Good Green Logo" class="main-logo">
                </a>
            </div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="packages.html">Packages</a></li>
                <li><a href="menu.html">Menu</a></li>
            </ul>
        </div>
    </nav>
</header>

<main class="checkout-main">
    <div class="checkout-header">
        <h1>Complete Your Order</h1>
        <p>Review your plan and price before confirming.</p>
    </div>

    <section id="order-details" class="checkout-card summary-card"></section>

    <div class="checkout-card">
        <form id="checkout-form">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="user_name" placeholder="Enter your full name" required>
            </div>
            
            <div class="form-group">
                <label>Phone Number</label>
                <input type="tel" id="user_phone" placeholder="e.g. +961 81 123 456" required>
            </div>
            
            <div class="form-group">
                <label>Delivery Address</label>
                <textarea id="user_address" rows="3" placeholder="Apartment, Street, Area" required></textarea>
            </div>

            <button type="submit" id="submit-btn" class="btn-primary" style="width: 100%; max-width: none; padding: 18px;">
                Confirm & Place Order
            </button>
            <p id="loading-text" style="text-align: center; color: var(--forest); display: none; margin-top: 15px; font-weight: 600;">
                Finalizing order... please stay on this page.
            </p>
        </form>
    </div>
</main>

<footer class="site-footer">
    <div class="footer-content">
        <p>&copy; 2026 The Good Green. All rights reserved.</p>
        <div class="footer-links">
            <a href="https://instagram.com/thegoodgreen.lb" target="_blank" class="footer-icon">
                <img src="https://cdn-icons-png.flaticon.com/512/174/174855.png" alt="Instagram" style="width: 18px;">
                <span>thegoodgreen.lb</span>
            </a>
            <a href="https://wa.me/96181153917" target="_blank" class="footer-icon">
                <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="WhatsApp" style="width: 18px; filter: brightness(0) invert(1);">
                <span>+961 81 15 39 17</span>
            </a>
        </div>
    </div>
</footer>

<script>
    (function() {
        emailjs.init("O38XtdcMyAkWnvsoU"); 
    })();

    window.onload = function() {
        // --- 1. SUPABASE CLIENT ---
        const sbUrl = 'https://dehcgxbupadfabotpwvg.supabase.co';
        const sbKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRlaGNneGJ1cGFkZmFib3Rwd3ZnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0MDEyNjUsImV4cCI6MjA4ODk3NzI2NX0.rXFsN9k0XYCPFf4BejbwkHvmuhvIid921jYeZmsUU6g';
        const sbClient = supabase.createClient(sbUrl, sbKey);

        // --- 2. LOAD SAVED ORDER DATA ---
        const savedData = localStorage.getItem('finalOrder');
        if (!savedData) {
            alert("No order data found. Please go back to the builder.");
            window.location.href = "builder.html";
            return;
        }
        const orderInfo = JSON.parse(savedData);

        // --- 3. AUTO-FILL USER DATA (If Logged In) ---
        const loggedInUser = localStorage.getItem('current_user');
        if (loggedInUser) {
            const user = JSON.parse(loggedInUser);
            // We match your Supabase column names to the form IDs
            if (user.full_name) document.getElementById('user_name').value = user.full_name;
            if (user.phone_number) document.getElementById('user_phone').value = user.phone_number;
            if (user.address) document.getElementById('user_address').value = user.address;
            
            // Optional: Add a small welcome message
            const headerP = document.querySelector('.checkout-header p');
            headerP.innerHTML = `Welcome back, <strong>${user.full_name.split(' ')[0]}</strong>! Please confirm your details below.`;
        }

        // --- 4. RENDER SUMMARY ---
        document.getElementById('order-details').innerHTML = `
            <h3 style="color: var(--forest); margin-top: 0;">Order Summary</h3>
            <div style="border-top: 1px solid #eee; padding-top: 15px;">
                <p><strong>Plan:</strong> ${orderInfo.plan_details.name}</p>
                <p><strong>Days:</strong> ${orderInfo.plan_details.days}</p>
                <p style="font-size: 1.2rem; color: var(--forest);"><strong>Total:</strong> $${orderInfo.plan_details.price}</p>
            </div>
        `;

        // --- 5. HANDLE SUBMISSION ---
        document.getElementById('checkout-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const btn = document.getElementById('submit-btn');
            const loading = document.getElementById('loading-text');
            btn.disabled = true;
            btn.innerText = "Saving Order...";
            loading.style.display = "block";

            try {
                // Save to 'orders' table
                const { data: mainOrder, error: orderErr } = await sbClient
                    .from('orders')
                    .insert([{
                        customer_name: document.getElementById('user_name').value,
                        customer_phone: document.getElementById('user_phone').value,
                        customer_address: document.getElementById('user_address').value,
                        plan_name: orderInfo.plan_details.name,
                        total_days: orderInfo.plan_details.days,
                        total_price: orderInfo.plan_details.price
                    }])
                    .select();

                if (orderErr) throw new Error("Order Save Error: " + orderErr.message);
                const orderId = mainOrder[0].id;

                // Prepare meal items
                const items = orderInfo.meals.map(m => ({
                    order_id: orderId,
                    day_number: m.day_number,
                    meal_name: m.meal_name,
                    choice: m.choice,
                    removals: m.removals || "" 
                }));

                // Save to 'order_items' table
                const { error: itemErr } = await sbClient.from('order_items').insert(items);
                if (itemErr) throw new Error("Meals Table Error: " + itemErr.message);

                // Send Email Notification via EmailJS
                await emailjs.send("service_rfcp52l", "template_oglmmp8", {
                    customer_name: document.getElementById('user_name').value,
                    plan_name: orderInfo.plan_details.name,
                    order_id: orderId
                });

                // Success: Clear order and redirect
                localStorage.removeItem('finalOrder');
                window.location.href = "thanks.html";

            } catch (err) {
                console.error(err);
                alert("Order failed: " + err.message);
                btn.disabled = false;
                btn.innerText = "Confirm & Place Order";
                loading.style.display = "none";
            }
        });
    };
</script>
</body>
</html>
