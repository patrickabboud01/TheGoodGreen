<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Good Green | Checkout</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    
    <style>
        /* Essential Sidebar CSS - Ensure this is in your style.css too */
        .menu-dots {
            display: flex;
            flex-direction: column;
            gap: 4px;
            cursor: pointer;
            padding: 10px;
            z-index: 1001;
        }
        .menu-dots span {
            width: 6px;
            height: 6px;
            background-color: #2d5a27;
            border-radius: 50%;
        }
        .sidebar {
            position: fixed;
            top: 0;
            right: -300px;
            width: 280px;
            height: 100%;
            background: #ffffff;
            box-shadow: -10px 0 20px rgba(0,0,0,0.1);
            transition: 0.4s ease;
            z-index: 2000;
            padding: 40px 25px;
        }
        .sidebar.active { right: 0; }
        .close-sidebar {
            font-size: 2.5rem;
            color: #2d5a27;
            cursor: pointer;
            text-align: right;
        }
        .sidebar-links { list-style: none; padding: 0; margin-top: 20px; }
        .sidebar-links li { margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .sidebar-links a { text-decoration: none; color: #333; font-weight: 600; font-size: 1.2rem; }
    </style>
</head>

<body class="checkout-body">
<header>
    <nav class="navbar">
        <div class="container">
            <div class="logo-area">
                <a href="index.html">
                    <img src="images/longlogo.png" alt="Logo" class="main-logo">
                </a>
            </div>

            <div class="menu-dots" id="menu-toggle">
                <span></span><span></span><span></span>
            </div>

            <div class="sidebar" id="sidebar">
                <div class="close-sidebar" id="close-sidebar">&times;</div>
                <ul class="sidebar-links">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="packages.html">Packages</a></li>
                    <li><a href="menu.html">Menu</a></li>
                </ul>
            </div>
        </div>
    </nav>
</header>

<main class="checkout-main">
    <div class="checkout-header">
        <h1>Finalize Your Subscription</h1>
        <p>We've calculated your plan based on your selections.</p>
    </div>

    <section id="order-details" class="checkout-card summary-card"></section>

    <div class="checkout-card">
        <form id="checkout-form">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="user_name" placeholder="Full name" required>
            </div>
            <div class="form-group">
                <label>Phone Number</label>
                <input type="tel" id="user_phone" placeholder="+961" required>
            </div>
            <div class="form-group">
                <label>Delivery Address</label>
                <textarea id="user_address" rows="3" placeholder="Street, Building, Floor" required></textarea>
            </div>

            <button type="submit" id="submit-btn" class="btn-primary" style="width: 100%; padding: 18px;">
                Confirm Order
            </button>
        </form>
    </div>
</main>

<script>
    (function() { emailjs.init("O38XtdcMyAkWnvsoU"); })();

    // --- SIDEBAR LOGIC ---
    document.addEventListener('DOMContentLoaded', function() {
        const toggle = document.getElementById('menu-toggle');
        const sidebar = document.getElementById('sidebar');
        const closeBtn = document.getElementById('close-sidebar');

        toggle.addEventListener('click', (e) => {
            e.stopPropagation();
            sidebar.classList.add('active');
        });

        closeBtn.addEventListener('click', () => {
            sidebar.classList.remove('active');
        });

        document.addEventListener('click', (e) => {
            if (!sidebar.contains(e.target) && sidebar.classList.contains('active')) {
                sidebar.classList.remove('active');
            }
        });
    });

    // --- CHECKOUT LOGIC ---
    const planPriceBook = {
        "THE SOLO": { "1": 12, "5": 50, "24": 200 },
        "THE DUO": { "1": 17, "5": 85, "24": 300 },
        "THE TRIO": { "1": 22, "5": 100, "24": 340 },
        "THE FULL PLAN": { "1": 25, "5": 110, "24": 400 },
        "PROTEIN BOOSTER": { "1": 10, "5": 40, "24": 150 }
    };

    let finalName = "";
    let finalPrice = 0;
    let finalDuration = "";

    window.onload = function() {
        const sbUrl = 'https://dehcgxbupadfabotpwvg.supabase.co';
        const sbKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRlaGNneGJ1cGFkZmFib3Rwd3ZnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0MDEyNjUsImV4cCI6MjA4ODk3NzI2NX0.rXFsN9k0XYCPFf4BejbwkHvmuhvIid921jYeZmsUU6g';
        const sbClient = supabase.createClient(sbUrl, sbKey);

        const rawOrder = localStorage.getItem('finalOrder');
        if (!rawOrder) {
            alert("No order found!");
            window.location.href = "builder.html";
            return;
        }

        const fullState = JSON.parse(rawOrder);
        
        let totalMeals = 0;
        let dayKeys = Object.keys(fullState).filter(day => fullState[day].length > 0);
        let activeDaysCount = dayKeys.length;

        dayKeys.forEach(day => {
            totalMeals += fullState[day].length;
        });

        const mealsPerDay = totalMeals / (activeDaysCount || 1);

        if (mealsPerDay > 3.5) finalName = "THE FULL PLAN";
        else if (mealsPerDay > 2.5) finalName = "THE TRIO";
        else if (mealsPerDay > 1.5) finalName = "THE DUO";
        else finalName = "THE SOLO";

        if (activeDaysCount <= 1) finalDuration = "1";
        else if (activeDaysCount <= 5) finalDuration = "5";
        else finalDuration = "24";

        finalPrice = planPriceBook[finalName][finalDuration];

        document.getElementById('order-details').innerHTML = `
            <div style="border-left: 5px solid #2d5a27; padding-left: 20px;">
                <h2 style="color: #2d5a27; margin: 0;">${finalName}</h2>
                <p style="margin: 5px 0; color: #666;">Duration: ${finalDuration} Day(s)</p>
                <div style="margin-top: 15px;">
                    <span style="font-size: 2.5rem; font-weight: 800; color: #2d5a27;">$${finalPrice}</span>
                    <span style="color: #666;"> total</span>
                </div>
            </div>
        `;

        const user = JSON.parse(localStorage.getItem('current_user') || '{}');
        if (user.full_name) {
            document.getElementById('user_name').value = user.full_name;
            document.getElementById('user_phone').value = user.phone_number || '';
            document.getElementById('user_address').value = user.address || '';
        }

        document.getElementById('checkout-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            btn.disabled = true;
            btn.innerText = "Processing...";

            try {
                const { data: order, error: err } = await sbClient.from('orders').insert([{
                    customer_name: document.getElementById('user_name').value,
                    customer_phone: document.getElementById('user_phone').value,
                    customer_address: document.getElementById('user_address').value,
                    plan_name: finalName + " (" + finalDuration + " Days)",
                    total_price: finalPrice
                }]).select();

                if (err) throw err;

                const items = [];
                dayKeys.forEach(day => {
                    fullState[day].forEach(meal => {
                        items.push({
                            order_id: order[0].id,
                            day_number: day,
                            meal_name: meal.name,
                            choice: meal.selectedChoices?.join(', ') || ''
                        });
                    });
                });

                await sbClient.from('order_items').insert(items);
                
                await emailjs.send("service_rfcp52l", "template_oglmmp8", {
                    customer_name: document.getElementById('user_name').value,
                    plan_name: finalName,
                    total_price: finalPrice
                });

                localStorage.removeItem('finalOrder');
                window.location.href = "thanks.html";
            } catch (x) {
                alert("Error: " + x.message);
                btn.disabled = false;
            }
        });
    };
</script>
</body>
</html>
