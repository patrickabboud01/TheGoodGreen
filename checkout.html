<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Good Green | Checkout</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    
    <style>
        /* --- CUSTOM ALERT MODAL STYLES --- */
        .custom-alert-overlay {
            display: none; 
            position: fixed; 
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); 
            z-index: 10000; 
            align-items: center; 
            justify-content: center;
            backdrop-filter: blur(4px);
        }
        .custom-alert-box {
            background: white;
            padding: 30px;
            border-radius: 20px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            animation: popIn 0.3s ease-out;
        }
        @keyframes popIn {
            0% { transform: scale(0.9); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .alert-btns {
            display: flex;
            gap: 10px;
            margin-top: 25px;
        }
        .btn-cancel {
            background: #eee;
            color: #444;
            border: none;
            padding: 12px;
            border-radius: 10px;
            flex: 1;
            cursor: pointer;
            font-weight: 600;
        }
        .btn-confirm-discard {
            background: #d9534f;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 10px;
            flex: 1;
            cursor: pointer;
            font-weight: 700;
        }

        /* --- SIDEBAR REFINEMENTS --- */
        .sidebar {
            position: fixed; top: 0; right: -280px; width: 280px; height: 100%;
            background: white; transition: 0.3s; z-index: 100000; padding: 20px;
            box-shadow: -5px 0 15px rgba(0,0,0,0.1); box-sizing: border-box;
            font-size: 0.9rem;
        }
        .sidebar.active { right: 0; }
        
        .user-greeting {
            padding: 30px 0 15px; margin-bottom: 15px;
            border-bottom: 1px solid #f4f1ea;
            font-weight: 700; color: #5d8039; font-size: 1rem;
        }

        .sidebar-links { list-style: none; padding: 0; margin: 0; }
        .sidebar-links li { margin-bottom: 10px; }
        .sidebar-links li a {
            font-weight: 400; color: #444; padding: 8px 0;
            display: block; text-decoration: none; transition: 0.2s;
        }
        .sidebar-links li a:hover { color: #5d8039; }

        .auth-btn-sidebar {
            margin-top: 20px; border-top: 1px solid #eee;
            padding-top: 15px; display: block; font-weight: 700;
            font-size: 0.85rem; cursor: pointer; text-decoration: none;
        }
        
        .site-footer {
            background-color:#5d8039; color: white; padding: 40px 15px;
            text-align: center; border-top: 5px solid #f4f1ea;
        }
        .footer-links {
            display: flex; flex-direction: row; justify-content: center;
            align-items: center; gap: 30px; margin-bottom: 25px;
        }
        .footer-icon {
            color: white; text-decoration: none; display: flex;
            flex-direction: column; align-items: center; gap: 8px;
            font-size: 0.75rem; transition: transform 0.2s; min-width: 70px;
        }
        .footer-icon i { font-size: 1.6rem; }
        .site-footer p {
            font-size: 0.7rem; opacity: 0.6; margin: 0; padding-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.1); letter-spacing: 1.5px;
        }

        .checkout-main {
            padding-top: 100px;
            min-height: 80vh;
        }

        @media (min-width: 992px) {
            .checkout-main {
                padding-top: 140px;
                width: 100%;
                max-width: none;
                margin: 0;
            }
            .checkout-card {
                width: 100%;
                max-width: none;
                border-radius: 0;
            }
        }
    </style>
</head>

<body class="checkout-body">

<div id="custom-alert" class="custom-alert-overlay">
    <div class="custom-alert-box">
        <div style="font-size: 2rem; margin-bottom: 10px;">⚠️</div>
        <h3 style="color: #5d8039; margin-bottom: 10px;">Discard Progress?</h3>
        <p style="color: #666; font-size: 0.9rem; line-height: 1.4;">Are you sure you want to leave? Your meal selections will not be saved.</p>
        <div class="alert-btns">
            <button class="btn-cancel" onclick="closeCustomAlert()">Stay Here</button>
            <button class="btn-confirm-discard" id="confirm-redirect-btn">Discard</button>
        </div>
    </div>
</div>

<header>
    <nav class="navbar">
        <div class="container">
            <div class="logo-area">
                <a href="index.html">
                    <img src="images/longlogo.png" alt="Logo" class="main-logo">
                </a>
            </div>
            <div class="menu-toggle" id="menu-toggle">
                <span></span><span></span><span></span><span></span>
            </div>

            <div class="sidebar" id="sidebar">
                <div class="close-sidebar" id="close-sidebar" style="position: absolute; top: 15px; right: 20px; font-size: 1.5rem; cursor: pointer; color: #2d5a27;">&times;</div>
                <div id="user-greeting" class="user-greeting">Hi, Guest</div>
                <ul class="sidebar-links">
                    <li><a href="index.html" style="color: #5d8039; font-weight: 700;">Home</a></li>
                    <li><a href="javascript:void(0)" onclick="protectedRedirect('plan-status.html')">Continue your plan</a></li>
                    <li><a href="javascript:void(0)" onclick="protectedRedirect('user-account.html')">My Account</a></li>
                    <li><a href="packages.html">Packages</a></li>
                    <li><a href="menu.html">Menu</a></li>
                    <li><a href="#" id="auth-btn" class="auth-btn-sidebar" onclick="handleAuthAction()">Login</a></li>
                </ul>
            </div>
        </div>
    </nav>
</header>

<main class="checkout-main">
    <div class="checkout-header"><h1>Finalize Your Order</h1></div>
    <section id="order-details" class="checkout-card summary-card"></section>

    <div class="checkout-card" style="margin-bottom: 20px;">
        <div class="form-group" id="promo-container">
            <label>Promo Code</label>
            <div style="display: flex; gap: 10px;">
                <input type="text" id="promo_code" placeholder="Enter code" style="flex: 1; padding: 12px; border-radius: 10px; border: 1px solid #ddd;">
                <button type="button" id="apply-promo" class="btn-primary" style="padding: 10px 20px; white-space: nowrap;">Apply</button>
            </div>
            <small id="promo-msg" style="display: block; margin-top: 5px; font-weight: 600;"></small>
        </div>
    </div>

    <div class="checkout-card">
        <form id="checkout-form">
            <div class="form-group"><label>Full Name</label><input type="text" id="user_name" required></div>
            <div class="form-group"><label>Phone Number</label><input type="tel" id="user_phone" required></div>
            <div class="form-group"><label>Delivery Address</label><textarea id="user_address" rows="3" required></textarea></div>
            <button type="submit" id="submit-btn" class="btn-primary" style="width: 100%; padding: 18px;">Confirm Order</button>
        </form>
    </div>
</main>

<script>
    // --- GLOBAL SCOPE VARIABLES ---
    let durationKey = "1"; 
    let finalPrice = 0;
    let discountAmount = 0;

    (function() { emailjs.init("O38XtdcMyAkWnvsoU"); })();
    const sbUrl = 'https://dehcgxbupadfabotpwvg.supabase.co';
    const sbKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRlaGNneGJ1cGFkZmFib3Rwd3ZnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0MDEyNjUsImV4cCI6MjA4ODk3NzI2NX0.rXFsN9k0XYCPFf4BejbwkHvmuhvIid921jYeZmsUU6g';
    const sbClient = supabase.createClient(sbUrl, sbKey);

    const planPriceBook = {
        "THE SOLO": { "1": 8.5, "6": 42, "24": 200 },
        "THE DUO": { "1": 17, "6": 85, "24": 300 },
        "THE TRIO": { "1": 22, "6": 100, "24": 340 },
        "THE FULL PLAN": { "1": 25, "6": 110, "24": 400 }
    };

    function triggerCustomAlert(url) {
        pendingUrl = url;
        document.getElementById('custom-alert').style.display = 'flex';
        document.getElementById('sidebar').classList.remove('active');
    }

    function closeCustomAlert() {
        document.getElementById('custom-alert').style.display = 'none';
        pendingUrl = "";
    }

    document.getElementById('confirm-redirect-btn').onclick = function() {
        if (pendingUrl) window.location.href = pendingUrl;
    };

    function updateAuthUI() {
        const authBtn = document.getElementById('auth-btn');
        const greeting = document.getElementById('user-greeting');
        const userStr = localStorage.getItem('current_user');

        if (userStr && greeting && authBtn) {
            const user = JSON.parse(userStr);
            const firstName = user.full_name ? user.full_name.split(' ')[0] : 'User';
            greeting.innerText = `Hi, ${firstName}`;
            authBtn.innerText = "Logout";
            authBtn.style.color = "#d9534f";
        } else if (greeting && authBtn) {
            greeting.innerText = "Hi, Guest";
            authBtn.innerText = "Login / Sign Up";
            authBtn.style.color = "#5d8039";
        }
    }

    function handleAuthAction() {
        const user = localStorage.getItem('current_user');
        if (user) {
            if (confirm("Are you sure you want to log out? Your order progress will be lost.")) {
                localStorage.removeItem('current_user');
                sessionStorage.removeItem('auth_choice_made');
                localStorage.removeItem('finalOrder');
                window.location.href = 'index.html';
            }
        } else {
            triggerCustomAlert('index.html?action=login');
        }
    }

    window.onload = async function() {
        updateAuthUI();
        
        const toggle = document.getElementById('menu-toggle');
        const sidebar = document.getElementById('sidebar');
        const closeBtn = document.getElementById('close-sidebar');

        if(toggle && sidebar && closeBtn) {
            toggle.onclick = (e) => { e.stopPropagation(); sidebar.classList.add('active'); };
            closeBtn.onclick = () => sidebar.classList.remove('active');
            document.onclick = (e) => {
                if (!sidebar.contains(e.target) && sidebar.classList.contains('active')) {
                    sidebar.classList.remove('active');
                }
            };
        }

        const user = JSON.parse(localStorage.getItem('current_user') || '{}');
        const rawOrder = localStorage.getItem('finalOrder');
        const urlParams = new URLSearchParams(window.location.search);
        const isSubscriptionRefill = urlParams.get('isSub') === 'true';
        
        if (!rawOrder) { window.location.href = "builder.html"; return; }
        const fullState = JSON.parse(rawOrder);

        let profile = null;
        if (user.email) {
            const { data } = await sbClient.from('profiles').select('*').eq('email', user.email).single();
            profile = data;
        }

        let dayKeys = Object.keys(fullState).filter(day => fullState[day].length > 0);
        let totalMeals = 0;
        dayKeys.forEach(d => totalMeals += fullState[d].length);
        const mealsPerDay = totalMeals / (dayKeys.length || 1);
        let finalName = mealsPerDay > 3.5 ? "THE FULL PLAN" : mealsPerDay > 2.5 ? "THE TRIO" : mealsPerDay > 1.5 ? "THE DUO" : "THE SOLO";

        let requestedDays = parseInt(urlParams.get('days')) || dayKeys.length;
        durationKey = requestedDays >= 24 ? "24" : (requestedDays >= 2 ? "6" : "1");
        finalPrice = planPriceBook[finalName][durationKey];

        if (isSubscriptionRefill && profile?.plan24days) {
            document.getElementById('order-details').innerHTML = `
                <div class="checkout-badge">Subscription Refill</div>
                <h2>${profile.active_package_name}</h2>
                <p>Week ${profile["24planweek"] + 1} Selection</p>
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <span>Due Today:</span><span style="font-size: 2rem; color: #5d8039;">$0.00</span>
                </div>`;
            document.getElementById('submit-btn').innerText = `Confirm Week ${profile["24planweek"] + 1}`;
        } else {
            document.getElementById('order-details').innerHTML = `
                <div class="checkout-badge">${durationKey}-Day Plan</div>
                <h2>${finalName}</h2>
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <span>Total:</span><span id="display-price" style="font-size: 2rem; color: #5d8039;">$${finalPrice}</span>
                </div>`;
        }

        if (user.full_name) {
            document.getElementById('user_name').value = user.full_name;
            document.getElementById('user_phone').value = user.phone_number || '';
            document.getElementById('user_address').value = user.address || '';
        }

        // --- PROMO CODE LOGIC ---
        document.getElementById('apply-promo').onclick = async function() {
            const code = document.getElementById('promo_code').value.trim().toUpperCase();
            const msg = document.getElementById('promo-msg');
            
            if (!user.email) {
                msg.style.color = "red";
                msg.innerText = "Please login to use a promo code.";
                return;
            }

            if (durationKey === "24") {
                msg.style.color = "red";
                msg.innerText = "Promo codes are not valid for 24-day plans.";
                return;
            }

            const { count } = await sbClient
                .from('orders')
                .select('*', { count: 'exact', head: true })
                .eq('customer_phone', user.phone_number);

            if (count > 0) {
                msg.style.color = "red";
                msg.innerText = "This code is for new customers only.";
                return;
            }

            if (code === "TGG20") {
                
                discountAmount = Math.round(finalPrice * 0.20* 10) / 10;
                msg.style.color = "#5d8039";
                msg.innerText = `Success! $${discountAmount} discount applied.`;
                document.getElementById('display-price').innerText = `$${finalPrice - discountAmount}`;
            } else {
                msg.style.color = "red";
                msg.innerText = "Invalid promo code.";
                discountAmount = 0;
                document.getElementById('display-price').innerText = `$${finalPrice}`;
            }
        };

        // --- FORM SUBMIT LOGIC ---
        document.getElementById('checkout-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            btn.disabled = true; 
            btn.innerText = "Processing...";

            try {
                const actualPaidPrice = isSubscriptionRefill ? 0 : (finalPrice - discountAmount);

                const { data: orderData, error: orderError } = await sbClient.from('orders').insert([{
                    customer_name: document.getElementById('user_name').value,
                    customer_phone: document.getElementById('user_phone').value,
                    customer_address: document.getElementById('user_address').value,
                    plan_name: isSubscriptionRefill ? `${profile.active_package_name} - Week ${profile["24planweek"]+1}` : `${finalName} (${durationKey} Day)`,
                    total_price: actualPaidPrice
                }]).select();

                if (orderError) throw orderError;

                const itemsToInsert = [];
                const orderId = orderData[0].id;

                dayKeys.forEach(day => {
                    fullState[day].forEach(m => {
                        itemsToInsert.push({
                            order_id: orderId,
                            day_number: parseInt(day),
                            meal_name: m.name,
                            choice: m.selectedChoices?.join(', ') || '', 
                            removed_ingredients: m.removedIngredients?.join(', ') || '',
                            special_instructions: m.instructions || m.specialInstructions || ""
                        });
                    });
                });

                const { error: itemsError } = await sbClient.from('order_items').insert(itemsToInsert);
                if (itemsError) throw itemsError;

                if (isSubscriptionRefill || durationKey === "24") {
                    let curWeek = isSubscriptionRefill ? (profile["24planweek"] || 0) : 0;
                    let nextWeek = curWeek + 1;
                    let stillActive = nextWeek < 4;
                    await sbClient.from('profiles').update({
                        "plan24days": stillActive,
                        "24planweek": stillActive ? nextWeek : 0,
                        "active_package_name": stillActive ? (profile?.active_package_name || finalName) : null
                    }).eq('email', user.email);
                }

                // Email Logic
                let emailPriceDisplay = actualPaidPrice.toString();
                const currentWeekNum = (profile && profile["24planweek"]) ? profile["24planweek"] : 0;

                await emailjs.send("service_rfcp52l", "template_oglmmp8", { 
                    customer_name: document.getElementById('user_name').value,
                    customer_phone: document.getElementById('user_phone').value,
                    customer_address: document.getElementById('user_address').value,
                    plan_name: (durationKey === "24") ? `${finalName} - Week ${currentWeekNum + 1}` : `${finalName} (${durationKey} Day)`,
                    total_price: emailPriceDisplay, 
                    order_id: orderId 
                });

                localStorage.removeItem('finalOrder');
                window.location.href = "thanks.html";

            } catch (err) { 
                console.error("Checkout Error:", err);
                alert("Error: " + err.message); 
                btn.disabled = false; 
                btn.innerText = "Confirm Order";
            }
        });
    };
</script>
