        /* --- GRID SYSTEM --- */
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 30px;
        }

        .menu-card {
            background: transparent;
            display: flex;
            flex-direction: column;
            transition: transform 0.2s ease;
        }

      

       /* 1. The Container now handles the rounding and "overflow" */
        .img-container {
            width: 100%;
            aspect-ratio: 1/1;
            background-color: white;
            border-radius: 25px; /* Use pixels for a consistent 'Squircle' look */
            overflow: hidden;    /* This "cuts" the image edges cleanly */
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 15px;
            cursor: zoom-in;
        }

        /* 2. The Image fills the container */
        .img-container img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* 'cover' fills the box like your Breakfast image */
            transition: 0.3s;
            border-radius: 0;   /* Remove radius from here */
            margin-bottom: 0;   /* Remove margin from here */
        }
        

        .menu-card:hover .img-container img {
            transform: scale(1.05);
        }

        .item-name {
            font-weight: 700;
            font-size: 1rem;
            text-transform: uppercase;
            margin: 0 0 8px 0;
            letter-spacing: 0.5px;
        }

        .item-ingredients {
            font-size: 0.8rem;
            color: #777;
            line-height: 1.4;
            margin-bottom: 15px;
            min-height: 38px;
        }

        /* --- MACRO TABLE --- */
        .macro-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            border-top: 1px solid #dcd9d0;
            padding-top: 12px;
            margin-top: auto;
        }

        .macro-item { display: flex; flex-direction: column; }
        .macro-val { font-weight: 700; font-size: 0.95rem; color: #333; }
        .macro-label { font-size: 0.6rem; text-transform: uppercase; color: #999; font-weight: 600; }

        /* --- LIGHTBOX --- */
        #lightbox {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            cursor: zoom-out;
        }

        #lightbox img {
            max-width: 90%;
            max-height: 85%;
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        /* --- FOOTER --- */

            background: #2d312b;
            color: white;

            text-align: center;
            margin-top: 60px;
        }

        .footer-logo img { height: 35px; margin-bottom: 15px; filter: brightness(0) invert(1); }
        .footer-text { font-size: 0.8rem; opacity: 0.7; }

        /* --- MOBILE OPTIMIZATION --- */

            .menu-grid {

                gap: 15px;
            }
            .category-header { font-size: 1.6rem; }

            .item-ingredients { font-size: 0.7rem; min-height: 30px; }
            .macro-val { font-size: 0.8rem; }
            .macro-label { font-size: 0.5rem; }

    <script>
       function renderVisualMenu() {
    const container = document.getElementById('menu-container');
    
    // 1. Group items by category, merging lunch and dinner
    const groups = rawMenuData.reduce((acc, item) => {
        let cat = item.category.toLowerCase();
        
        // Merge lunch and dinner into a single group
        if (cat === 'lunch' || cat === 'dinner') {
            cat = 'main meals';
        }
        
        if (!acc[cat]) acc[cat] = [];
        acc[cat].push(item);
        return acc;
    }, {});

    container.innerHTML = '';

    // 2. Build HTML for each Category
    for (const category in groups) {
        const section = document.createElement('div');
        section.className = 'category-section';

        // Use the category name directly as the title
        // Since we renamed them to 'main meals' above, it will display correctly
        section.innerHTML = `<h2 class="category-header" style="text-transform: capitalize;">${category}</h2>`;
        
        const grid = document.createElement('div');
        grid.className = 'menu-grid';

        groups[category].forEach(item => {
            const ingredients = [item.fixed_ingredients, item.removable_ingredients]
                .filter(Boolean).join('; ').replace(/;/g, ', ');

            grid.innerHTML += `
                <div class="menu-card">
                    <div class="img-container" onclick="openImage('${item.image}')">
                        <img src="${item.image}" alt="${item.name}" onerror="this.src='https://placehold.co/400?text=Delicious+Vegan+Meal'">
                    </div>
                    <div class="item-info">
                        <h3 class="item-name">${item.name}</h3>
                        <p class="item-ingredients">${ingredients}</p>
                        
                        <div class="macro-row">
                            <div class="macro-item">
                                <span class="macro-val">${item.Kcal || '--'}</span>
                                <span class="macro-label">Kcal</span>
                            </div>
                            <div class="macro-item">
                                <span class="macro-val">${item.protein}g</span>
                                <span class="macro-label">Protein</span>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        });

        section.appendChild(grid);
        container.appendChild(section);
    }
}

        // Lightbox function
        function openImage(src) {
            const lb = document.getElementById('lightbox');
            const lbImg = document.getElementById('lightbox-img');
            lbImg.src = src;
            lb.style.display = 'flex';
        }

        window.onload = renderVisualMenu;

document.addEventListener('DOMContentLoaded', function() {
    const toggle = document.getElementById('menu-toggle');
    const sidebar = document.getElementById('sidebar');
    const closeBtn = document.getElementById('close-sidebar');
    const overlay = document.getElementById('sidebar-overlay');
    const authBtn = document.getElementById('auth-btn');

    // 1. Toggle Sidebar Open
    toggle.addEventListener('click', (e) => {
        e.stopPropagation(); // Prevents the 'click outside' logic from firing immediately
        sidebar.classList.add('active');
       // overlay.style.display = 'block'; 
    });

    // 2. X Button: Back to Menu Page
    closeBtn.addEventListener('click', () => {
        window.location.href = "menu.html";
    });

    // 3. Close Sidebar Function
    const closeMenu = () => {
        sidebar.classList.remove('active');
        overlay.style.display = 'none';
    };

    // 4. Click Outside Logic
    // If user clicks the overlay OR anywhere else on the document
    document.addEventListener('click', function(event) {
        const isClickInsideSidebar = sidebar.contains(event.target);
        const isClickOnToggle = toggle.contains(event.target);

        // If the click is not inside the sidebar and not on the hamburger icon
        if (!isClickInsideSidebar && !isClickOnToggle && sidebar.classList.contains('active')) {
            closeMenu();
        }
    });

    // Handle clicking the overlay specifically (optional but good for mobile)
    overlay.addEventListener('click', closeMenu);

    // --- User Info & Auth (English) ---
    const userStr = localStorage.getItem('current_user');
    if (userStr) {
        const user = JSON.parse(userStr);
        document.getElementById('user-greeting').innerText = `Hi, ${user.full_name.split(' ')[0]}`;
        authBtn.innerText = "Logout";
        authBtn.style.color = "#d9534f";
    }

    authBtn.addEventListener('click', function() {
        if (localStorage.getItem('current_user')) {
            if (confirm("Logout?")) {
                localStorage.removeItem('current_user');
                window.location.reload();
            }
        } else {
            window.location.href = "index.html?action=login";
        }
    });
});
    </script>

    <script>
        window.addEventListener('scroll', function() {
    const btn = document.querySelector('.floating-btn');
    const footer = document.querySelector('.site-footer');
    
    // 1. Get the top of the footer relative to the viewport
    const footerRect = footer.getBoundingClientRect();
    const footerTop = footerRect.top;
    const windowHeight = window.innerHeight;

    // 2. Check if the footer is visible on screen
    if (footerTop < windowHeight) {
        // Calculate how much of the footer is showing
        const overflow = windowHeight - footerTop;
        // Set bottom to: the height of the footer showing + 20px extra gap
        btn.style.bottom = (overflow + 20) + "px";
    } else {
        // Footer is not on screen, reset to default 30px from bottom
        btn.style.bottom = "30px";
    }
});

function protectedRedirect(url) {
    if (localStorage.getItem('current_user')) {
        window.location.href = url;
    } else {
        
        window.location.href = "index.html?action=login";
    }
}
