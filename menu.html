<script>
    // --- AUTH & SIDEBAR UI LOGIC ---
    function updateAuthUI() {
        const authBtn = document.getElementById('auth-btn');
        const greeting = document.getElementById('user-greeting');
        const userStr = localStorage.getItem('current_user');

        if (userStr && greeting && authBtn) {
            const user = JSON.parse(userStr);
            const firstName = user.full_name ? user.full_name.split(' ')[0] : 'User';
            greeting.innerText = `Hi, ${firstName}`;
            authBtn.innerText = "Logout";
            authBtn.style.color = "#d9534f";
        } else if (greeting && authBtn) {
            greeting.innerText = "Hi, Guest";
            authBtn.innerText = "Login / Sign Up";
            authBtn.style.color = "#2d5a27";
        }
    }

    function handleAuthAction() {
        if (localStorage.getItem('current_user')) {
            localStorage.removeItem('current_user');
            window.location.href = 'index.html';
        } else {
            window.location.href = 'index.html?action=login';
        }
    }

    // --- INTERFACE LOGIC ---
    document.addEventListener('DOMContentLoaded', function() {
        updateAuthUI();

        const toggle = document.getElementById('menu-toggle');
        const sidebar = document.getElementById('sidebar');
        const closeBtn = document.getElementById('close-sidebar');

        if(toggle && sidebar && closeBtn) {
            toggle.addEventListener('click', (e) => {
                e.stopPropagation();
                sidebar.classList.add('active');
            });

            closeBtn.addEventListener('click', () => {
                sidebar.classList.remove('active');
            });

            document.addEventListener('click', (e) => {
                if (!sidebar.contains(e.target) && sidebar.classList.contains('active')) {
                    sidebar.classList.remove('active');
                }
            });
        }
    });

    // Header Scroll Logic
    let lastScrollY = window.scrollY;
    const header = document.querySelector('header');
    window.addEventListener('scroll', () => {
        if (window.scrollY > lastScrollY && window.scrollY > 100) {
            header.classList.add('header-hidden');
        } else {
            header.classList.remove('header-hidden');
        }
        lastScrollY = window.scrollY;
    });
</script>
