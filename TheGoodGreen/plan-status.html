<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Journey | The Good Green</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .status-page { background: #f9fbf9; min-height: 100vh; padding: 20px; font-family: 'Montserrat', sans-serif; }
        .status-card { background: white; border-radius: 20px; padding: 30px; max-width: 500px; margin: 40px auto; box-shadow: 0 10px 30px rgba(0,0,0,0.05); text-align: center; }
        .badge-active { background: #e8f5e9; color: #2d5a27; padding: 6px 12px; border-radius: 20px; font-weight: 700; font-size: 0.8rem; display: inline-block; margin-bottom: 15px; }
        .progress-bar-bg { background: #eee; height: 12px; border-radius: 10px; margin: 25px 0 10px; overflow: hidden; }
        .progress-bar-fill { background: #2d5a27; height: 100%; transition: width 0.5s ease; }
        .progress-labels { display: flex; justify-content: space-between; font-size: 0.75rem; color: #777; font-weight: 600; }
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 30px; text-align: left; border-top: 1px solid #eee; padding-top: 20px; }
        .info-item { font-size: 0.85rem; color: #555; }
        .info-item strong { color: #2d5a27; display: block; margin-bottom: 2px; }
    </style>
</head>
<body class="status-page">
    <div class="container">
        <header style="text-align: center; padding-bottom: 20px;">
            <a href="index.html"><img src="images/longlogo.png" alt="Logo" style="width: 160px;"></a>
        </header>

        <main class="status-card" id="status-container">
            <div style="padding: 40px;">Loading your progress...</div>
        </main>
    </div>

    <script>
        const sbUrl = 'https://dehcgxbupadfabotpwvg.supabase.co';
        const sbKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRlaGNneGJ1cGFkZmFib3Rwd3ZnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0MDEyNjUsImV4cCI6MjA4ODk3NzI2NX0.rXFsN9k0XYCPFf4BejbwkHvmuhvIid921jYeZmsUU6g';
        const sbClient = supabase.createClient(sbUrl, sbKey);

        window.onload = async function() {
            const user = JSON.parse(localStorage.getItem('current_user'));
            if (!user) { window.location.href = "builder.html"; return; }

            const { data: profile, error } = await sbClient.from('profiles').select('*').eq('email', user.email).single();
            const container = document.getElementById('status-container');

            if (!profile || !profile.plan24days) {
                container.innerHTML = `
                    <h2>Welcome, ${user.full_name}!</h2>
                    <p style="color:#666; margin: 15px 0;">You don't have an active 24-Day Journey yet.</p>
                    <a href="packages.html" class="btn-primary" style="display:block; margin-top:20px;">Get Started</a>
                `;
                return;
            }

            const currentWeek = profile["24planweek"] || 0;
            const progressPercent = (currentWeek / 4) * 100;
            const pkg = profile.active_package_name || "THE SOLO";
            
            let items = 1;
            if (pkg.toUpperCase().includes("DUO")) items = 2;
            else if (pkg.toUpperCase().includes("TRIO")) items = 3;
            else if (pkg.toUpperCase().includes("FULL")) items = 4;

            const buildLink = `builder.html?plan=${encodeURIComponent(pkg)}&items=${items}&days=24`;

            container.innerHTML = `
                <span class="badge-active">JOURNEY ACTIVE</span>
                <h1 style="color:#2d5a27; margin-bottom: 5px;">${pkg}</h1>
                <p style="color:#777; font-size:0.9rem;">Your Sustainable Living Plan</p>

                <div class="progress-section">
                    <div class="progress-bar-bg">
                        <div class="progress-bar-fill" style="width: ${progressPercent}%"></div>
                    </div>
                    <div class="progress-labels">
                        <span>Day 1</span>
                        <span style="color:#2d5a27;">Week ${currentWeek + 1} of 4</span>
                        <span>Day 24</span>
                    </div>
                </div>

                <div style="margin-top: 35px;">
                    <a href="${buildLink}" class="btn-primary" style="display: block; text-decoration: none; padding: 18px; font-weight:700;">
                        Build Week ${currentWeek + 1} Meals
                    </a>
                </div>

                <div class="info-grid">
                    <div class="info-item"><strong>Current Week</strong> Week ${currentWeek + 1}</div>
                    <div class="info-item"><strong>Plan Price</strong> Pre-paid</div>
                    <div class="info-item"><strong>Account</strong> ${user.email}</div>
                    <div class="info-item"><strong>Status</strong> Active</div>
                </div>
                
                <button onclick="localStorage.clear(); location.reload();" style="background:none; border:none; color:#aaa; font-size:0.7rem; margin-top:30px; cursor:pointer;">Log Out</button>
            `;
        }
    </script>
</body>
</html>
