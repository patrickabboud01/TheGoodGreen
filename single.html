<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Now | The Good Green</title>
    <script src="js/data/single-data.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
          .site-footer {
            background-color:#5d8039; color: white; padding: 40px 15px;
            text-align: center; border-top: 5px solid #f4f1ea;
        }
        .footer-links {
            display: flex; flex-direction: row; justify-content: center;
            align-items: center; gap: 30px; margin-bottom: 25px;
        }
        .footer-icon {
            color: white; text-decoration: none; display: flex;
            flex-direction: column; align-items: center; gap: 8px;
            font-size: 0.75rem; transition: transform 0.2s; min-width: 70px;
        }
        /* --- BRAND COLORS & BASE --- */
        :root { 
            --brand-green: #2d5a27; 
            --light-green: #5d8039; 
            --text-dark: #333; 
            --bg-cream: #f9fbf8;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            color: var(--text-dark);
            overflow-x: hidden;
            background-color: white;
        }

        @media (min-width: 768px) {
            html {
                zoom: 100%;
            }
        }

        /* --- HEADER & NAVIGATION --- */
        header {
            background-color: white;
            padding: 15px 20px;
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            box-sizing: border-box;
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }

        .main-logo {
            height: 40px;
            width: auto;
        }

        /* --- MENU TOGGLE (HAMBURGER) --- */
        .menu-toggle {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            width: 30px;
            height: 21px;
            cursor: pointer;
            z-index: 10001;
        }

        .menu-toggle span {
            display: block;
            width: 100%;
            height: 1px;
            background-color: var(--brand-green);
            transition: 0.3s;
        }

        /* --- SIDEBAR --- */
        .sidebar {
            position: fixed;
            top: 0;
            right: -280px;
            width: 280px;
            height: 100%;
            background-color: white;
            box-shadow: -5px 0 15px rgba(0,0,0,0.1);
            transition: transform 0.3s ease-in-out;
            z-index: 10000;
            padding: 60px 20px;
            box-sizing: border-box;
        }

        .sidebar.active {
            transform: translateX(-280px);
        }

        .sidebar-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: none;
            z-index: 9999;
        }

        .sidebar-links {
            list-style: none;
            padding: 0;
            margin-top: 20px;
        }

        .sidebar-links li {
            margin-bottom: 25px;
        }

        .sidebar-links a {
            text-decoration: none;
            color: var(--text-dark);
            font-size: 1.1rem;
            font-weight: 500;
            transition: color 0.3s;
        }

        .sidebar-links a:hover {
            color: var(--light-green);
        }

        .user-greeting {
            font-weight: 700;
            color: var(--light-green);
            margin-bottom: 10px;
        }

        /* --- CONTENT WRAPPER --- */
        main.content-wrapper {
            padding-top: 120px;
            padding-bottom: 30px;
            max-width: 1200px;
            margin: 0 auto;
            padding-left: 20px;
            padding-right: 20px;
            min-height: 80vh;
        }

        @media (max-width: 480px) {
            main.content-wrapper {
                padding-top: 100px;
                padding-left: 15px;
                padding-right: 15px;
            }
        }

        .category-header {
            font-size: clamp(1.5rem, 5vw, 2.2rem);
            color: var(--light-green);
            border-bottom: 2px solid #e0ddd5;
            padding-bottom: 10px;
            margin-bottom: 25px;
            margin-top: 35px;
            text-transform: capitalize;
        }

        .category-header:first-of-type {
            margin-top: 0;
        }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 120px;
        }

        @media (min-width: 768px) {
            .menu-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 30px;
            }
        }

        @media (min-width: 1200px) {
            .menu-grid {
                grid-template-columns: repeat(3, 1fr);
                gap: 35px;
            }
        }

        @media (max-width: 480px) {
            main.content-wrapper {
                padding-left: 15px;
                padding-right: 15px;
            }

            .menu-grid {
                width: 100%;
                gap: 15px;
                box-sizing: border-box;
            }
        }

        /* --- CARDS & ITEMS --- */
        .img-container { 
            width: 100%; 
            aspect-ratio: 1/1; 
            border-radius: 25px; 
            overflow: hidden; 
            position: relative; 
            margin-bottom: 15px; 
        }

        .img-container img { width: 100%; height: 100%; object-fit: cover; }
        .clickable-image { cursor: pointer; transition: transform 0.2s; }
        .clickable-image:hover { transform: scale(1.05); }

        .price-tag { 
            position: absolute; 
            top: 15px; 
            left: 15px; 
            background: var(--brand-green); 
            color: white; 
            padding: 5px 12px; 
            border-radius: 12px; 
            font-weight: 700; 
        }

        .menu-card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .menu-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }

        .item-name {
            font-weight: 700;
            text-transform: uppercase;
            margin: 0 0 8px 0;
            font-size: clamp(0.9rem, 2vw, 1rem);
            color: var(--text-dark);
        }

        .item-info {
            padding: 0 15px 15px 15px;
        }

        .item-description {
            font-size: 0.85rem;
            color: #666;
            margin-bottom: 10px;
            line-height: 1.4;
        }

        .order-action {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid #eee;
            padding: 10px 15px 0 15px;
            gap: 10px;
        }

        .order-action .qty-controls {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* --- COMING SOON CARD --- */
        .coming-soon-container { display: flex; justify-content: center; align-items: center; min-height: 60vh; width: 100%; }
        .cs-card { 
            background: white; 
            border-radius: 30px; 
            padding: 60px 40px; 
            text-align: center; 
            border: 2px dashed var(--light-green); 
            max-width: 500px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.05); 
        }

        /* --- COUNTER BUTTONS --- */
        .add-btn {
            background: var(--light-green);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 50px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.85rem;
            white-space: nowrap;
        }

        .add-btn:hover {
            background: var(--brand-green);
            transform: scale(1.05);
        }

        .add-btn:active {
            transform: scale(0.95);
        }

        .qty-btn {
            background: white;
            color: var(--light-green);
            border: 1.5px solid var(--light-green);
            width: 28px;
            height: 28px;
            border-radius: 50%;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        .qty-btn:hover {
            background: var(--light-green);
            color: white;
        }

        .qty-text {
            font-weight: 700;
            color: var(--brand-green);
            min-width: 20px;
            text-align: center;
            font-size: 0.85rem;
        }

        /* --- MODAL STYLES --- */
        .modal { display: none; position: fixed; z-index: 11000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.6); align-items: center; justify-content: center; }
        .modal-content { background-color: white; border-radius: 25px; width: 90%; max-width: 500px; max-height: 80vh; overflow-y: auto; padding: 30px; position: relative; box-shadow: 0 5px 30px rgba(0,0,0,0.3); }
        .modal-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #eee; padding-bottom: 15px; margin-bottom: 20px; }
        .cart-item-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; padding-bottom: 15px; border-bottom: 1px solid #f5f5f5; }
        .checkout-now-btn { display: block; width: 100%; background: var(--brand-green); color: white; text-align: center; padding: 15px; border-radius: 50px; text-decoration: none; font-weight: 700; margin-top: 20px; }

        /* --- IMAGE LIGHTBOX MODAL --- */
        .image-modal { display: none; position: fixed; z-index: 12000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.9); align-items: center; justify-content: center; }
        .image-modal.active { display: flex; }
        .image-modal-content { max-width: 90%; max-height: 90vh; position: relative; }
        .image-modal img { width: 100%; height: auto; border-radius: 15px; }
        .image-modal-close { position: absolute; top: 20px; right: 20px; color: white; font-size: 2.5rem; cursor: pointer; background: rgba(0,0,0,0.5); border: none; padding: 5px 15px; border-radius: 50%; line-height: 1; }
        .image-modal-close:hover { background: rgba(0,0,0,0.8); }

        /* --- FOOTER & FLOATING BTN --- */
        .floating-btn {
            position: fixed;
            right: 15px;
            bottom: 15px;
            background: #5d8039;
            color: white;
            padding: 12px 20px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 700;
            z-index: 2000;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: all 0.3s;
            border: none;
            font-size: 0.9rem;
        }

        .floating-btn:hover {
            background: #4a662e;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.4);
        }

        .floating-btn.disabled {
            background: #ccc;
            cursor: not-allowed;
            box-shadow: none;
        }

        @media (max-width: 480px) {
            .floating-btn {
                right: 10px;
                bottom: 10px;
                padding: 10px 16px;
                font-size: 0.85rem;
                gap: 6px;
            }

            .floating-btn span {
                display: none;
            }

            .floating-btn {
                width: 50px;
                height: 50px;
                border-radius: 50%;
                justify-content: center;
                padding: 0;
            }
        }

        @media (min-width: 481px) and (max-width: 767px) {
            .floating-btn {
                right: 12px;
                bottom: 12px;
                padding: 11px 18px;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>

<div id="cart-modal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2 style="margin:0; color:var(--brand-green)">Your Cart</h2>
            <span style="font-size:1.5rem; cursor:pointer;" onclick="closeCart()">&times;</span>
        </div>
        <div id="cart-items-list"></div>
        <div id="cart-summary" style="margin-top:20px; text-align:right;">
            <h3 id="modal-total">Total: $0.00</h3>

        <a href="javascript:void(0)" class="checkout-now-btn" onclick="proceedToCheckout()">Proceed to Checkout</a>

<div id="empty-cart-modal" class="modal">
    <div class="modal-content" style="max-width: 400px; text-align: center;">
        <span style="font-size:1.5rem; cursor:pointer; position: absolute; top: 15px; right: 15px;" onclick="closeEmptyCartModal()">&times;</span>
        <i class="fa-solid fa-cart-shopping" style="font-size: 3rem; color: var(--light-green); margin-bottom: 20px; display: block;"></i>
        <h2 style="margin:0 0 15px 0; color:var(--brand-green)">Your Cart is Empty</h2>
        <p style="color: #666; margin-bottom: 25px;">Please add items to your cart before checking out.</p>
        <div style="display: flex; flex-direction: column; gap: 10px;">
            <a href="index.html" class="checkout-now-btn" style="background: var(--brand-green); text-decoration: none; margin: 0;">Back to Home</a>
            <button onclick="closeEmptyCartModal()" style="background: var(--light-green); color: white; border: none; padding: 15px; border-radius: 50px; cursor: pointer; font-weight: 700;">Continue Shopping</button>
        </div>
    </div>
</div>

<div id="image-modal" class="image-modal" onclick="closeImageModal(event)">
    <div class="image-modal-content" onclick="event.stopPropagation()">
        <button class="image-modal-close" onclick="closeImageModal()">&times;</button>
        <img id="enlarged-image" src="" alt="Enlarged view">

</div>

<div id="choices-modal" class="modal">
    <div class="modal-content" style="max-width: 450px; max-height: 85vh; overflow-y: auto;">
        <div style="position: relative; margin-bottom: 20px;">
            <h3 id="choices-title" style="color: var(--brand-green); margin: 0; padding-right: 30px;">Select Your Options</h3>
            <button onclick="closeChoicesModal()" style="position: absolute; top: 0; right: 0; background: none; border: none; font-size: 1.5rem; cursor: pointer; color: #888;">&times;</button>
        </div>
        <div id="choices-container" style="margin-bottom: 20px;">
        </div>
        <button onclick="proceedToEditFromChoices()" class="checkout-now-btn" style="margin: 0;">Continue to Customize</button>
    </div>
</div>

<div id="edit-item-modal" class="modal">
    <div class="modal-content" style="max-width: 450px; max-height: 85vh; overflow-y: auto;">
        <div style="position: relative; margin-bottom: 20px;">
            <h3 id="edit-item-title" style="color: var(--brand-green); margin: 0; padding-right: 30px;">Edit Item</h3>
            <button onclick="closeEditItemModal()" style="position: absolute; top: 0; right: 0; background: none; border: none; font-size: 1.5rem; cursor: pointer; color: #888;">&times;</button>
        </div>
        <div id="edit-ingredients-container" style="max-height: 300px; overflow-y: auto; border: 1px solid #eee; border-radius: 12px; padding: 15px; margin-bottom: 20px; background: #fafafa;">
        </div>
        <div style="margin-bottom: 20px;">
            <label style="display: block; font-size: 0.9rem; color: #666; margin-bottom: 8px; font-weight: 600;">Special Instructions (Optional)</label>
            <textarea id="edit-special-instructions"
                placeholder="e.g. No salt, extra spicy, allergies..."
                style="width: 100%; height: 80px; border: 1px solid #ddd; border-radius: 8px; padding: 10px; font-family: inherit; font-size: 0.9rem; resize: none; box-sizing: border-box;"></textarea>
        </div>
        <button onclick="saveEditedItem()" class="checkout-now-btn" style="margin: 0;">Save Changes</button>
    </div>
</div>

    <nav class="navbar">
        <a href="index.html"><img src="images/longlogo.png" alt="Logo" class="main-logo"></a>
        <div class="menu-toggle" id="menu-toggle"><span></span><span></span><span></span><span></span></div>
        
        <div class="sidebar" id="sidebar">
            <div id="close-sidebar" style="position: absolute; top: 15px; right: 20px; font-size: 1.5rem; cursor: pointer; color: var(--brand-green);">&times;</div>

            </ul>

</header>

<button class="floating-btn" id="float-cart" onclick="openCart()">
    <span>View Cart: $0.00</span> <i class="fa-solid fa-cart-shopping"></i>
</button>

<script>
    // Master Switch
    const isComingSoon = false;

    // Clear cart on every page reload for fresh start
    localStorage.removeItem('single_order_cart');
    let cart = [];
    let instanceCounter = 0;

    function initPage() {
        const container = document.getElementById('single-container');
        const floatBtn = document.getElementById('float-cart');

        if (isComingSoon) {
            container.innerHTML = `
                <div class="coming-soon-container">
                    <div class="cs-card">
                        <i class="fa-solid fa-clock-rotate-left" style="font-size: 3.5rem; color: var(--light-green); margin-bottom: 25px; display: block;"></i>
                        <h1 style="color: var(--brand-green); margin-bottom: 15px;">Single Orders Coming Soon</h1>
                        <p style="color: #666; line-height: 1.6;">We are perfecting our daily individual menu. Check back soon for plant-powered goodness delivered to your door!</p>
                    </div>
                </div>`;
            floatBtn.classList.add('disabled');
            floatBtn.innerHTML = `<span>Coming Soon</span> <i class="fa-solid fa-lock"></i>`;
            floatBtn.onclick = null;
        } else {
            renderMenu();
        }
    }

    // --- CART & MENU LOGIC ---
    function openCart() {
        renderCartModal();
        document.getElementById('cart-modal').style.display = 'flex';
    }

    function closeCart() {
        document.getElementById('cart-modal').style.display = 'none';
    }

    function updateCartTotal() {
        const total = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
        document.getElementById('float-cart').querySelector('span').innerText = `View Cart: $${total.toFixed(2)}`;
        document.getElementById('modal-total').innerText = `Total: $${total.toFixed(2)}`;
        localStorage.setItem('single_order_cart', JSON.stringify(cart));
    }

    function renderMenu() {
        const container = document.getElementById('single-container');
        container.innerHTML = '';
        const groups = singleMenuData.reduce((acc, item) => {
            if (!acc[item.category]) acc[item.category] = [];
            acc[item.category].push(item);
            return acc;
        }, {});

        for (const cat in groups) {
            const section = document.createElement('div');
            section.innerHTML = `<h2 class="category-header">${cat}</h2>`;
            const grid = document.createElement('div');
            grid.className = 'menu-grid';

            groups[cat].forEach(item => {
                const safeName = item.name.replace(/\s+/g, '-');
                grid.innerHTML += `
                    <div class="menu-card">
                        <div class="img-container">
                            <div class="price-tag">$${item.price.toFixed(2)}</div>
                            <img src="${item.image}" alt="${item.name}" class="clickable-image" onclick="openImageModal('${item.image}', event)">
                        </div>
                        <div class="item-info">
                            <h3 class="item-name">${item.name}</h3>
                            <p class="item-description">${item.ingredients || ''}</p>
                            <div class="order-action">
                                <span style="font-size:0.8rem; color:#999;">${item.Kcal} Kcal | ${item.protein}g Protein</span>
                                <button class="add-btn" onclick="openAddItemModal('${item.name}', ${item.price}, '${item.ingredients || ''}')">Add</button>
                            </div>
                        </div>
                    </div>`;
            });
            section.appendChild(grid);
            container.appendChild(section);
            groups[cat].forEach(item => updateControls(item.name, item.price));
        }
        updateCartTotal();
    }

    function renderCartModal() {
        const list = document.getElementById('cart-items-list');
        list.innerHTML = '';
        if (cart.length === 0) {
            list.innerHTML = '<p style="text-align:center; color:#999;">Your cart is empty.</p>';
            return;
        }
        cart.forEach((item) => {
            const instrDisplay = item.specialInstructions ? `<div style="font-size:0.75rem; color:#999; font-style:italic; margin-top:5px;">📝 ${item.specialInstructions}</div>` : '';
            const removedIngrDisplay = item.removedIngredients.length > 0 ? `<div style="font-size:0.75rem; color:#d9534f; margin-top:3px;">❌ No: ${item.removedIngredients.join(', ')}</div>` : '';

            let choicesDisplay = '';
            if (item.choices && Object.keys(item.choices).length > 0) {
                choicesDisplay = '<div style="font-size:0.75rem; color:#5d8039; margin-top:5px; font-weight:600;">✓ Choices: ';
                choicesDisplay += Object.values(item.choices).join(', ');
                choicesDisplay += '</div>';
            }

            list.innerHTML += `
                <div class="cart-item-row" style="flex-direction: column; align-items: flex-start;">
                    <div style="width: 100%; display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                        <div style="flex:1;">
                            <h4 style="margin:0; text-transform:uppercase;">${item.name}</h4>
                            <p style="margin:5px 0; color:var(--light-green); font-weight:700;">$${item.price.toFixed(2)}</p>
                            ${choicesDisplay}
                            ${removedIngrDisplay}
                            ${instrDisplay}
                        </div>
                        <button onclick="removeFromCart(${item.instanceId}); renderCartModal();" style="color:red; background:none; border:none; font-size:1.2rem; cursor:pointer;">&times;</button>
                    </div>
                    <div style="width: 100%; display: flex; justify-content: space-between; gap: 10px;">
                        <button onclick="openEditItemModal(${item.instanceId})" style="flex:1; background: var(--light-green); color: white; border: none; padding: 8px; border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 0.8rem;">Edit</button>
                        <div class="qty-controls" style="gap: 5px;">
                            <button class="qty-btn" onclick="updateItemQty(${item.instanceId}, -1); renderCartModal();">-</button>
                            <span class="qty-text">${item.qty}</span>
                            <button class="qty-btn" onclick="updateItemQty(${item.instanceId}, 1); renderCartModal();">+</button>
                        </div>
                    </div>
                </div>`;
        });
    }

    function addToCart(name, price) {
        const itemData = singleMenuData.find(i => i.name === name);
        cart.push({
            instanceId: ++instanceCounter,
            name,
            price,
            qty: 1,
            removedIngredients: [],
            specialInstructions: '',
            ingredients: itemData?.ingredients || '',
            choices: {}
        });
        updateControls(name, price);
        updateCartTotal();
    }

    function removeFromCart(instanceId) {
        cart = cart.filter(i => i.instanceId !== instanceId);
        updateCartTotal();
    }

    function updateControls(name, price) {
        const safeName = name.replace(/\s+/g, '-');
        const div = document.getElementById(`controls-${safeName}`);
        if (!div) return;
        const totalQty = cart.filter(i => i.name === name).reduce((sum, item) => sum + item.qty, 0);
        if (totalQty > 0) {
            div.innerHTML = `
                <span class="qty-text">${totalQty}x</span>
                <button class="add-btn" onclick="addToCart('${name}', ${price})">Add More</button>`;
        } else {
            div.innerHTML = `<button class="add-btn" onclick="addToCart('${name}', ${price})">Add</button>`;
        }
    }

    function proceedToCheckout() {
        if (cart.length === 0) {
            closeCart();
            document.getElementById('empty-cart-modal').style.display = 'flex';
        } else {
            window.location.href = 'checkout.html';
        }
    }

    function closeEmptyCartModal() {
        document.getElementById('empty-cart-modal').style.display = 'none';
    }

    // --- IMAGE LIGHTBOX FUNCTIONS ---
    function openImageModal(imageSrc, event) {
        event.stopPropagation();
        const modal = document.getElementById('image-modal');
        const img = document.getElementById('enlarged-image');
        img.src = imageSrc;
        modal.classList.add('active');
    }

    function closeImageModal(event) {
        if (event) event.stopPropagation();
        const modal = document.getElementById('image-modal');
        modal.classList.remove('active');
    }

    function updateItemQty(instanceId, change) {
        const item = cart.find(i => i.instanceId === instanceId);
        if (item) {
            item.qty += change;
            if (item.qty <= 0) removeFromCart(instanceId);
        }
        updateCartTotal();
    }

    // --- EDIT ITEM & CHOICES FUNCTIONS ---
    let currentEditingInstanceId = null;
    let isAddingNewItem = false;
    let pendingNewItemData = {};
    let pendingSelectedChoices = {};

    function openAddItemModal(itemName, itemPrice, itemIngredients) {
        const itemData = singleMenuData.find(i => i.name === itemName);

        // Check if item has choices
        if (itemData && (itemData.choicename1 || itemData.choicename2 || itemData.choicename3)) {
            isAddingNewItem = true;
            currentEditingInstanceId = null;
            pendingNewItemData = {
                name: itemName,
                price: itemPrice,
                ingredients: itemIngredients,
                removedIngredients: [],
                specialInstructions: ''
            };
            pendingSelectedChoices = {};
            showChoicesModal(itemName, itemData);
        } else {
            // No choices, go directly to edit modal
            isAddingNewItem = true;
            currentEditingInstanceId = null;
            pendingNewItemData = {
                name: itemName,
                price: itemPrice,
                ingredients: itemIngredients,
                removedIngredients: [],
                specialInstructions: '',
                choices: {}
            };
            openEditModal();
        }
    }

    function showChoicesModal(itemName, itemData) {
        document.getElementById('choices-title').innerText = `${itemName} - Select Your Options`;
        const container = document.getElementById('choices-container');
        container.innerHTML = '';

        let choiceCount = 0;
        for (let i = 1; i <= 3; i++) {
            const choiceNameKey = `choicename${i}`;
            const choiceItemsKey = `choiceitems${i}`;

            if (itemData[choiceNameKey] && itemData[choiceItemsKey]) {
                choiceCount++;
                const choiceName = itemData[choiceNameKey];
                const choiceItems = itemData[choiceItemsKey].split(',').map(item => item.trim());

                container.innerHTML += `
                    <div style="margin-bottom: 20px;">
                        <label style="display: block; font-size: 0.9rem; color: #666; margin-bottom: 12px; font-weight: 600;">${choiceName}</label>
                        <div style="display: flex; flex-direction: column; gap: 8px;">
                            ${choiceItems.map((item, idx) => `
                                <label style="display: flex; align-items: center; gap: 10px; padding: 10px; border: 1px solid #ddd; border-radius: 8px; cursor: pointer; transition: all 0.2s;">
                                    <input type="radio" name="choice-${i}" value="${item}" style="width: 18px; height: 18px; cursor: pointer; accent-color: #5d8039;">
                                    <span style="font-size: 0.95rem;">${item}</span>
                                </label>
                            `).join('')}
                        </div>
                    </div>`;
            }
        }

        if (choiceCount === 0) {
            container.innerHTML = '<p style="color:#999; text-align: center;">No choices available for this item.</p>';
        }

        document.getElementById('choices-modal').style.display = 'flex';
    }

    function proceedToEditFromChoices() {
        for (let i = 1; i <= 3; i++) {
            const selectedRadio = document.querySelector(`input[name="choice-${i}"]:checked`);
            if (selectedRadio) {
                pendingSelectedChoices[`choice${i}`] = selectedRadio.value;
            }
        }
        pendingNewItemData.choices = pendingSelectedChoices;
        closeChoicesModal();
        openEditModal();
    }

    function closeChoicesModal() {
        document.getElementById('choices-modal').style.display = 'none';
    }

    function openEditModal() {
        document.getElementById('edit-item-title').innerText = `Customize ${pendingNewItemData.name}`;
        document.getElementById('edit-special-instructions').value = '';

        const ingredientsContainer = document.getElementById('edit-ingredients-container');
        ingredientsContainer.innerHTML = '';

        if (pendingNewItemData.ingredients) {
            const ingredientsList = pendingNewItemData.ingredients.split(',').map(i => i.trim()).filter(i => i);
            ingredientsList.forEach(ingredient => {
                ingredientsContainer.innerHTML += `
                    <label style="display: flex; align-items: center; gap: 12px; padding: 10px; border-bottom: 1px solid #f0f0f0; cursor: pointer;">
                        <input type="checkbox" class="ingredient-checkbox" data-ingredient="${ingredient}" style="width:18px; height:18px; accent-color: #5d8039;" checked onchange="toggleNewItemIngredient('${ingredient}')">
                        <span style="font-size: 0.95rem;">${ingredient}</span>
                    </label>`;
            });
        } else {
            ingredientsContainer.innerHTML = '<p style="color:#999; text-align: center;">No customizable ingredients for this item.</p>';
        }

        document.getElementById('edit-item-modal').style.display = 'flex';
    }

    function openEditItemModal(instanceId) {
        isAddingNewItem = false;
        currentEditingInstanceId = instanceId;
        const item = cart.find(i => i.instanceId === instanceId);

        document.getElementById('edit-item-title').innerText = `Edit ${item.name}`;
        document.getElementById('edit-special-instructions').value = item.specialInstructions || '';

        const ingredientsContainer = document.getElementById('edit-ingredients-container');
        ingredientsContainer.innerHTML = '';

        if (item.ingredients) {
            const ingredientsList = item.ingredients.split(',').map(i => i.trim()).filter(i => i);
            ingredientsList.forEach(ingredient => {
                const isRemoved = item.removedIngredients.includes(ingredient);
                ingredientsContainer.innerHTML += `
                    <label style="display: flex; align-items: center; gap: 12px; padding: 10px; border-bottom: 1px solid #f0f0f0; cursor: pointer;">
                        <input type="checkbox" class="ingredient-checkbox" data-ingredient="${ingredient}" style="width:18px; height:18px; accent-color: #5d8039;" ${isRemoved ? '' : 'checked'} onchange="toggleEditIngredient('${ingredient}')">
                        <span style="font-size: 0.95rem;">${ingredient}</span>
                    </label>`;
            });
        } else {
            ingredientsContainer.innerHTML = '<p style="color:#999; text-align: center;">No customizable ingredients for this item.</p>';
        }

        document.getElementById('edit-item-modal').style.display = 'flex';
    }

    function closeEditItemModal() {
        document.getElementById('edit-item-modal').style.display = 'none';
        currentEditingInstanceId = null;
    }

    function toggleNewItemIngredient(ingredient) {
        if (pendingNewItemData.removedIngredients.includes(ingredient)) {
            pendingNewItemData.removedIngredients = pendingNewItemData.removedIngredients.filter(i => i !== ingredient);
        } else {
            pendingNewItemData.removedIngredients.push(ingredient);
        }
    }

    function toggleEditIngredient(ingredient) {
        const item = cart.find(i => i.instanceId === currentEditingInstanceId);
        if (item) {
            if (item.removedIngredients.includes(ingredient)) {
                item.removedIngredients = item.removedIngredients.filter(i => i !== ingredient);
            } else {
                item.removedIngredients.push(ingredient);
            }
        }
    }

    function saveEditedItem() {
        if (isAddingNewItem) {
            pendingNewItemData.specialInstructions = document.getElementById('edit-special-instructions').value;
            cart.push({
                instanceId: ++instanceCounter,
                name: pendingNewItemData.name,
                price: pendingNewItemData.price,
                qty: 1,
                removedIngredients: pendingNewItemData.removedIngredients,
                specialInstructions: pendingNewItemData.specialInstructions,
                ingredients: pendingNewItemData.ingredients,
                choices: pendingNewItemData.choices || {}
            });
            updateControls(pendingNewItemData.name, pendingNewItemData.price);
        } else {
            const item = cart.find(i => i.instanceId === currentEditingInstanceId);
            if (item) {
                item.specialInstructions = document.getElementById('edit-special-instructions').value;
                renderCartModal();
            }
        }
        updateCartTotal();
        closeEditItemModal();
    }

    // --- SIDEBAR & GLOBAL ---
    const toggle = document.getElementById('menu-toggle');
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('sidebar-overlay');
    const closeBtn = document.getElementById('close-sidebar');

    toggle.onclick = (e) => { 
        e.stopPropagation();
        sidebar.classList.add('active'); 
       // overlay.style.display = 'block'; 
    };

    const hideSidebar = () => { 
        sidebar.classList.remove('active'); 
        overlay.style.display = 'none'; 
    };

    overlay.onclick = hideSidebar;
    closeBtn.onclick = hideSidebar;

    window.addEventListener('scroll', () => {
        const btn = document.getElementById('float-cart');
        const footer = document.querySelector('.site-footer');
        if(!footer) return;
        const footerRect = footer.getBoundingClientRect();
        btn.style.bottom = (footerRect.top < window.innerHeight) ? (window.innerHeight - footerRect.top + 20) + "px" : "30px";
    });

    window.onclick = (event) => {
        if (event.target == document.getElementById('cart-modal')) closeCart();
        if (event.target == document.getElementById('choices-modal')) closeChoicesModal();
        if (event.target == document.getElementById('edit-item-modal')) closeEditItemModal();
    };

    function protectedRedirect(url) {
        if (localStorage.getItem('current_user')) window.location.href = url;
        else alert("Please log in to access this page.");
    }
    // Close sidebar when clicking outside of it
document.addEventListener('click', function(event) {
    const sidebar = document.getElementById('sidebar');
    const toggle = document.getElementById('menu-toggle');
    const overlay = document.getElementById('sidebar-overlay');

    // Check if the sidebar is currently open
    if (sidebar.classList.contains('active')) {
        
        // If the click happened OUTSIDE the sidebar AND OUTSIDE the toggle button
        if (!sidebar.contains(event.target) && !toggle.contains(event.target)) {
            sidebar.classList.remove('active');
            
            // Also hide the overlay if you are using one
            if (overlay) {
                overlay.style.display = 'none';
            }
        }
    }
});

    window.onload = initPage;
</script>
</body>
</html>
