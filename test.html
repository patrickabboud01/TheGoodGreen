<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quote Request Card</title>
    
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script type="text/javascript">
        (function() {
            // REPLACE 'YOUR_PUBLIC_KEY' with your actual EmailJS Public Key
            emailjs.init("O38XtdcMyAkWnvsoU");
        })();
    </script>

    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f4f7f6; margin: 0; }

        /* Card Styling */
        .quote-card {
            background: white;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            width: 320px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        .quote-card h3 { margin-top: 0; color: #333; }
        .quote-card button {
            background-color: #25D366;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.2s;
        }
        .quote-card button:hover { transform: scale(1.05); }

        /* Modal (Hidden Window) */
        .modal {
            display: none;
            position: fixed;
            z-index: 100;
            left: 0; top: 0;
            width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
        }
        .modal-content {
            background-color: white;
            margin: 10% auto;
            padding: 25px;
            width: 90%;
            max-width: 400px;
            border-radius: 12px;
            position: relative;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .close-btn { position: absolute; right: 20px; top: 15px; font-size: 24px; cursor: pointer; color: #888; }

        /* Form Styling */
        form input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
        }
        .submit-btn {
            width: 100%;
            background-color: #128C7E;
            color: white;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }
        .submit-btn:hover { background-color: #075E54; }
    </style>
</head>
<body>

    <div class="quote-card">
        <h3>Nutrition Plan</h3>
        <p>Ready to hit your goals? Get a custom quote sent to your phone.</p>
        <button id="openModalBtn">Request a Quote</button>
    </div>

    <div id="quoteModal" class="modal">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <h2 style="margin-top:0">Quote Details</h2>
            <form id="quote-form">
                <input type="text" name="user_name" placeholder="Your Name" required>
                <input type="tel" name="user_phone" placeholder="Your Phone Number" required>
                <input type="number" name="kcal_goal" placeholder="Daily Kcal Goal (e.g. 2500)" required>
                <input type="number" name="protein_goal" placeholder="Protein Goal in Grams" required>
                
                <button type="submit" class="submit-btn">Get your quote on WhatsApp</button>
            </form>
        </div>
    </div>

    <script>
        const modal = document.getElementById("quoteModal");
        const btn = document.getElementById("openModalBtn");
        const closeX = document.querySelector(".close-btn");
        const form = document.getElementById("quote-form");

        // UI Interactions
        btn.onclick = () => modal.style.display = "block";
        closeX.onclick = () => modal.style.display = "none";
        window.onclick = (event) => { if (event.target == modal) modal.style.display = "none"; }

        // Form Logic
        form.addEventListener("submit", function(event) {
            event.preventDefault();

            // 1. Send data to EmailJS
            // REPLACE 'YOUR_SERVICE_ID' and 'YOUR_TEMPLATE_ID'
            emailjs.sendForm('service_ku8gtez', 'template_tlc5mia', this)
                .then(() => {
                    alert("Details sent! Redirecting to WhatsApp...");
                    
                    // 2. Extract values for WhatsApp
                    const phone = form.user_phone.value;
                    const name = form.user_name.value;
                    const kcal = form.kcal_goal.value;
                    const protein = form.protein_goal.value;

                    // Message structure
                    const msg = `Hello! My name is ${name}. I am looking for a quote. My goals are ${kcal} kcal and ${protein}g of protein.`;
                    
                });
        });
    </script>

</body>
</html>
