    <style>
        /* Refined Footer Styles */
        .site-footer {
            background-color:#5d8039; color: white; padding: 40px 15px;
            text-align: center; border-top: 5px solid #f4f1ea;
        }
        .footer-links {
            display: flex; flex-direction: row; justify-content: center;
            align-items: center; gap: 30px; margin-bottom: 25px;
        }
        .footer-icon {
            color: white; text-decoration: none; display: flex;
            flex-direction: column; align-items: center; gap: 8px;
            font-size: 0.75rem; transition: transform 0.2s; min-width: 70px;
        }
        .footer-icon i { font-size: 1.6rem; }
        .site-footer p {
            font-size: 0.7rem; opacity: 0.6; margin: 0; padding-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.1); letter-spacing: 1.5px;
        }
        /* 1. STICKY FOOTER & RESET */
        html, body { height: 100%; margin: 0; padding: 0; }
        body { 
            display: flex; 
            flex-direction: column; 
            background: #f9fbf9; 
            font-family: 'Montserrat', sans-serif; 
        }

        /* 2. SIDEBAR STYLING */
        .sidebar {
            position: fixed; top: 0; right: -280px; width: 280px; height: 100%;
            background: white; transition: 0.3s; z-index: 100000; padding: 20px;
            box-shadow: -5px 0 15px rgba(0,0,0,0.1); box-sizing: border-box;
        }
        .sidebar.active { right: 0; }
        .user-greeting {
            padding: 30px 0 15px; border-bottom: 1px solid #f4f1ea;
            font-weight: 700; color: #5d8039; margin-bottom: 15px;
        }
        .sidebar-links { list-style: none; padding: 0; }
        .sidebar-links li { margin-bottom: 10px; }
        .sidebar-links li a { color: #444; text-decoration: none; display: block; padding: 8px 0; }
        .close-sidebar { position: absolute; top: 15px; right: 20px; font-size: 1.5rem; cursor: pointer; color: #5d8039; }

        /* 3. MAIN CONTENT AREA */
        main { flex: 1 0 auto; padding: 40px 20px; }
        
        .status-card { 
            background: white; border-radius: 20px; padding: 30px; 
            max-width: 500px; margin: 0 auto; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.05); text-align: center; 
        }

        .badge-active { background: #e8f5e9; color: #5d8039; padding: 6px 12px; border-radius: 20px; font-weight: 700; font-size: 0.8rem; display: inline-block; margin-bottom: 15px; }
        .progress-bar-bg { background: #eee; height: 12px; border-radius: 10px; margin: 25px 0 10px; overflow: hidden; }
        .progress-bar-fill { background: #5d8039; height: 100%; transition: width 0.5s ease; }
        .progress-labels { display: flex; justify-content: space-between; font-size: 0.75rem; color: #777; font-weight: 600; }
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 30px; text-align: left; border-top: 1px solid #eee; padding-top: 20px; }
        .info-item { font-size: 0.85rem; color: #555; }
        .info-item strong { color: #5d8039; display: block; margin-bottom: 2px; }

        .site-footer { flex-shrink: 0; }
    </style>
</head>
<body>

<style>

<div class="sidebar" id="sidebar">

<script>
    const sbUrl = 'https://dehcgxbupadfabotpwvg.supabase.co';
    const sbKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRlaGNneGJ1cGFkZmFib3Rwd3ZnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0MDEyNjUsImV4cCI6MjA4ODk3NzI2NX0.rXFsN9k0XYCPFf4BejbwkHvmuhvIid921jYeZmsUU6g';
    const sbClient = supabase.createClient(sbUrl, sbKey);

    // 1. Sidebar Logic (Handles both sidebars if they exist)
    document.getElementById('menu-toggle').onclick = () => {
        document.querySelectorAll('.sidebar').forEach(s => s.classList.add('active'));
    };
    
    document.querySelectorAll('.close-sidebar').forEach(btn => {
        btn.onclick = () => {
            document.querySelectorAll('.sidebar').forEach(s => s.classList.remove('active'));
        };
    });

    // 2. The missing redirect function
    function protectedRedirect(url) {
        const user = localStorage.getItem('current_user');
        if (!user) {
            window.location.href = 'index.html?action=login';
        } else {
            window.location.href = url;
        }
    }

    function handleAuthAction() {
        if (localStorage.getItem('current_user')) {
            localStorage.removeItem('current_user');
            window.location.href = 'index.html';
        } else {
            window.location.href = 'index.html?action=login';
        }
    }

    window.onload = async function() {
        const user = JSON.parse(localStorage.getItem('current_user'));
        const greetings = document.querySelectorAll('.user-greeting');
        const authBtns = document.querySelectorAll('#auth-btn');

        if (user) {
            const firstName = user.full_name.split(' ')[0];
            greetings.forEach(g => g.innerText = `Hi, ${firstName}`);
            authBtns.forEach(b => {
                b.innerText = "Logout";
                b.style.color = "#d9534f";
            });
        }

        if (!user) { 
            window.location.href = "index.html?action=login"; 
            return; 
        }

        // Fetch profile data
        const { data: profile } = await sbClient.from('profiles').select('*').eq('email', user.email).single();
        const container = document.getElementById('status-container');

        if (!profile || !profile.plan24days) {
            container.innerHTML = `<h2>Welcome!</h2><p>You don't have an active plan yet.</p><a href="packages.html" class="btn-primary">Get Started</a>`;
            return;
        }

        const currentWeek = profile["24planweek"] || 0;
        const progressPercent = (currentWeek / 4) * 100;
        const pkgName = profile.active_package_name || "THE SOLO";
        
        let itemsCount = 1;
        const nameUpper = pkgName.toUpperCase();
        if (nameUpper.includes("DUO")) itemsCount = 2;
        else if (nameUpper.includes("TRIO")) itemsCount = 3;
        else if (nameUpper.includes("FULL")) itemsCount = 4;

        const encodedPlan = encodeURIComponent(pkgName);

        container.innerHTML = `
            <span class="badge-active">JOURNEY ACTIVE</span>
            <h1 style="color:#5d8039; margin-bottom: 5px;">${pkgName}</h1>
            <div class="progress-bar-bg"><div class="progress-bar-fill" style="width: ${progressPercent}%"></div></div>
            <div class="progress-labels"><span>Day 1</span><span style="color:#5d8039;">Week ${currentWeek + 1} of 4</span><span>Day 24</span></div>
            
            <div style="margin-top: 35px;">
                <a href="builder.html?plan=${encodedPlan}&items=${itemsCount}&days=24&price=0" 
                   class="btn-primary" 
                   style="display:block; text-decoration:none; padding:15px;">
                    Build Week ${currentWeek + 1} Meals
                </a>
            </div>
        `;
    }
</script>
</body>
