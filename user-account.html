<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Account | The Good Green</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .account-container { max-width: 800px; margin: 40px auto; padding: 20px; }
        .tabs { display: flex; gap: 10px; margin-bottom: 30px; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .tab-btn { background: none; border: none; padding: 10px 20px; cursor: pointer; font-weight: 700; color: #888; transition: 0.3s; }
        .tab-btn.active { color: #2d5a27; border-bottom: 3px solid #2d5a27; }
        
        .section-panel { display: none; animation: fadeIn 0.3s ease-in; }
        .section-panel.active { display: block; }
        
        .order-card { background: white; border-radius: 15px; padding: 20px; margin-bottom: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); display: flex; justify-content: space-between; align-items: center; }
        .order-info h4 { color: #2d5a27; margin-bottom: 5px; }
        .order-info p { font-size: 0.85rem; color: #666; }
        
        .btn-reorder { background: #2d5a27; color: white; border: none; padding: 10px 15px; border-radius: 8px; cursor: pointer; font-weight: 600; transition: 0.2s; }

        /* --- CUSTOM POPUP MODAL --- */
        .modal-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.7); z-index: 99999;
            align-items: center; justify-content: center; backdrop-filter: blur(4px);
        }
        .modal-box {
            background: white; padding: 30px; border-radius: 20px;
            width: 90%; max-width: 400px; text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            animation: popIn 0.3s ease-out;
        }
        @keyframes popIn {
            0% { transform: scale(0.9); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .modal-btns { display: flex; gap: 10px; margin-top: 25px; }
        .m-btn { flex: 1; padding: 12px; border-radius: 10px; border: none; font-weight: 700; cursor: pointer; }
        .m-btn-green { background: #2d5a27; color: white; }
        .m-btn-gray { background: #eee; color: #444; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="account-body">

<div id="custom-modal" class="modal-overlay">
    <div class="modal-box">
        <div id="modal-icon" style="font-size: 2.5rem; margin-bottom: 15px;">🌿</div>
        <h3 id="modal-title" style="color: #2d5a27; margin-bottom: 10px;">Message</h3>
        <p id="modal-text" style="color: #666; font-size: 0.95rem; line-height: 1.4;"></p>
        <div class="modal-btns" id="modal-buttons">
            </div>
    </div>
</div>

<header>
    <nav class="navbar">
        <div class="container">
            <div class="logo-area">
                <a href="index.html"><img src="images/longlogo.png" alt="Logo" class="main-logo"></a>
            </div>
            <div class="menu-dots" id="menu-toggle"><span></span><span></span><span></span></div>
            <div class="sidebar" id="sidebar">
                <div class="close-sidebar" id="close-sidebar">&times;</div>
                <ul class="sidebar-links">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="packages.html">Packages</a></li>
                    <li><a href="menu.html">Menu</a></li>
                    <li><a href="user-account.html" style="color: #2d5a27; font-weight: 700;">My Account</a></li>
                </ul>
            </div>
        </div>
    </nav>
</header>

<main class="account-container">
    <h1 style="margin-bottom: 20px;">Welcome Back, <span id="user-display-name">...</span></h1>

    <div class="tabs">
        <button class="tab-btn active" onclick="showTab('edit-info')">Edit Info</button>
        <button class="tab-btn" onclick="showTab('order-history')">Order History</button>
    </div>

    <section id="edit-info" class="section-panel active">
        <div class="checkout-card">
            <form id="update-profile-form">
                <div class="form-group"><label>Full Name</label><input type="text" id="acc-name" required></div>
                <div class="form-group"><label>Phone Number</label><input type="tel" id="acc-phone" required></div>
                <div class="form-group"><label>Delivery Address</label><textarea id="acc-address" rows="3" required></textarea></div>
                <button type="submit" id="save-btn" class="btn-primary" style="width: 100%;">Save Changes</button>
            </form>
        </div>
    </section>

    <section id="order-history" class="section-panel">
        <div id="orders-list">
            <p style="text-align: center; color: #888;">Fetching your orders...</p>
        </div>
    </section>
</main>

<script>
    const sbUrl = 'https://dehcgxbupadfabotpwvg.supabase.co';
    const sbKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRlaGNneGJ1cGFkZmFib3Rwd3ZnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0MDEyNjUsImV4cCI6MjA4ODk3NzI2NX0.rXFsN9k0XYCPFf4BejbwkHvmuhvIid921jYeZmsUU6g';
    const sbClient = supabase.createClient(sbUrl, sbKey);

    let currentUser = JSON.parse(localStorage.getItem('current_user') || '{}');

    /* --- MODAL ENGINE --- */
    function showPopup({ title, text, icon = "🌿", buttons = [] }) {
        const modal = document.getElementById('custom-modal');
        document.getElementById('modal-title').innerText = title;
        document.getElementById('modal-text').innerText = text;
        document.getElementById('modal-icon').innerText = icon;
        
        const btnContainer = document.getElementById('modal-buttons');
        btnContainer.innerHTML = "";

        buttons.forEach(btn => {
            const b = document.createElement('button');
            b.innerText = btn.text;
            b.className = `m-btn ${btn.type === 'green' ? 'm-btn-green' : 'm-btn-gray'}`;
            b.onclick = () => {
                modal.style.display = 'none';
                if (btn.action) btn.action();
            };
            btnContainer.appendChild(b);
        });

        modal.style.display = 'flex';
    }

    function showTab(tabId) {
        document.querySelectorAll('.section-panel').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        event.target.classList.add('active');
    }

    async function loadProfile() {
        if (!currentUser.email) { window.location.href = "index.html"; return; }
        const { data } = await sbClient.from('profiles').select('*').eq('email', currentUser.email).single();
        if (data) {
            document.getElementById('user-display-name').innerText = data.full_name;
            document.getElementById('acc-name').value = data.full_name;
            document.getElementById('acc-phone').value = data.phone_number || '';
            document.getElementById('acc-address').value = data.address || '';
        }
    }

    document.getElementById('update-profile-form').onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById('save-btn');
        btn.disabled = true; btn.innerText = "Saving...";

        const { error } = await sbClient.from('profiles').update({
            full_name: document.getElementById('acc-name').value,
            phone_number: document.getElementById('acc-phone').value,
            address: document.getElementById('acc-address').value
        }).eq('email', currentUser.email);

        if (!error) {
            showPopup({ title: "Success", text: "Profile updated successfully!", icon: "✅", buttons: [{ text: "Great", type: "green" }] });
        } else { 
            showPopup({ title: "Error", text: error.message, icon: "❌", buttons: [{ text: "OK", type: "gray" }] });
        }
        btn.disabled = false; btn.innerText = "Save Changes";
    };

    async function loadOrders() {
        const { data: orders } = await sbClient
            .from('orders')
            .select(`*, order_items(*)`)
            .eq('customer_phone', currentUser.phone_number)
            .order('created_at', { ascending: false });

        const container = document.getElementById('orders-list');
        if (!orders || orders.length === 0) {
            container.innerHTML = "<p style='text-align:center;'>No previous orders found.</p>";
            return;
        }

        container.innerHTML = orders.map(order => `
            <div class="order-card">
                <div class="order-info">
                    <h4>${order.plan_name}</h4>
                    <p>${new Date(order.created_at).toLocaleDateString()} | $${order.total_price}</p>
                </div>
                <button class="btn-reorder" onclick='handleReorder(${JSON.stringify(order)})'>Reorder</button>
            </div>
        `).join('');
    }

    async function handleReorder(order) {
        const { data: profile } = await sbClient.from('profiles').select('plan24days, "24planweek"').eq('email', currentUser.email).single();

        const reorderState = {};
        order.order_items.forEach(item => {
            if (!reorderState[item.day_number]) reorderState[item.day_number] = [];
            reorderState[item.day_number].push({
                name: item.meal_name,
                selectedChoices: item.choice ? item.choice.split(', ') : []
            });
        });

        localStorage.setItem('finalOrder', JSON.stringify(reorderState));
        const dayCount = Object.keys(reorderState).length;

        if (profile?.plan24days === true) {
            if (dayCount === 6) {
                showPopup({
                    title: "Subscription Refill",
                    text: `Use this 6-day history for Week ${profile["24planweek"] + 1}?`,
                    buttons: [
                        { text: "Yes, Use Refill", type: "green", action: () => window.location.href = `checkout.html?isSub=true&days=6` },
                        { text: "Cancel", type: "gray" }
                    ]
                });
                return;
            } else {
                showPopup({
                    title: "Incomplete Week",
                    text: "Subscription refills require a 6-day order. You can still purchase this as a separate extra order.",
                    icon: "⚠️",
                    buttons: [
                        { text: "Buy as Extra", type: "green", action: () => window.location.href = `checkout.html?days=${dayCount}` },
                        { text: "Cancel", type: "gray" }
                    ]
                });
                return;
            }
        }

        // Standard flow for non-subscribers
        showPopup({
            title: "Confirm Reorder",
            text: `Reorder this ${dayCount}-day plan for $${order.total_price}?`,
            buttons: [
                { text: "Confirm", type: "green", action: () => window.location.href = `checkout.html?days=${dayCount}` },
                { text: "Back", type: "gray" }
            ]
        });
    }

    document.getElementById('menu-toggle').onclick = () => document.getElementById('sidebar').classList.add('active');
    document.getElementById('close-sidebar').onclick = () => document.getElementById('sidebar').classList.remove('active');

    window.onload = () => { loadProfile(); loadOrders(); };
</script>
</body>
</html>
