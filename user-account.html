<!DOCTYPE html>
<html lang="en">
<head>
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Account | The Good Green</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .account-container { max-width: 800px; margin: 40px auto; padding: 20px; }
        .tabs { display: flex; gap: 10px; margin-bottom: 30px; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .tab-btn { background: none; border: none; padding: 10px 20px; cursor: pointer; font-weight: 700; color: #888; transition: 0.3s; }
        .tab-btn.active { color: #5d8039; border-bottom: 3px solid #5d8039; }
        
        .section-panel { display: none; animation: fadeIn 0.3s ease-in; }
        .section-panel.active { display: block; }
        
        .order-card { background: white; border-radius: 15px; padding: 20px; margin-bottom: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); display: flex; justify-content: space-between; align-items: center; }
        .order-info h4 { color: #5d8039; margin-bottom: 5px; }
        .order-info p { font-size: 0.85rem; color: #666; }
        
        .btn-reorder { background: #5d8039; color: white; border: none; padding: 10px 15px; border-radius: 8px; cursor: pointer; font-weight: 600; transition: 0.2s; }

        /* --- CUSTOM POPUP MODAL --- */
        .modal-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.7); z-index: 99999;
            align-items: center; justify-content: center; backdrop-filter: blur(4px);
        }
        .modal-box {
            background: white; padding: 30px; border-radius: 20px;
            width: 90%; max-width: 400px; text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            animation: popIn 0.3s ease-out;
        }
        @keyframes popIn {
            0% { transform: scale(0.9); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .modal-btns { display: flex; gap: 10px; margin-top: 25px; }
        .m-btn { flex: 1; padding: 12px; border-radius: 10px; border: none; font-weight: 700; cursor: pointer; }
        .m-btn-green { background: #5d8039; color: white; }
        .m-btn-gray { background: #eee; color: #444; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* --- UNIFIED SIDEBAR STYLES --- */
        .sidebar {
            position: fixed; top: 0; right: -280px; width: 280px; height: 100%;
            background: white; transition: 0.3s; z-index: 100000; padding: 20px;
            box-shadow: -5px 0 15px rgba(0,0,0,0.1); box-sizing: border-box;
            font-size: 0.9rem;
        }
        .sidebar.active { right: 0; }
        .user-greeting {
            padding: 30px 0 15px; margin-bottom: 15px;
            border-bottom: 1px solid #f4f1ea;
            font-weight: 700; color: #5d8039; font-size: 1rem;
        }
        .sidebar-links { list-style: none; padding: 0; margin: 0; }
        .sidebar-links li { margin-bottom: 10px; }
        .sidebar-links li a {
            font-weight: 400; color: #444; padding: 8px 0;
            display: block; text-decoration: none; transition: 0.2s;
        }
        .sidebar-links li a:hover { color: #5d8039; }
        .auth-btn-sidebar {
            margin-top: 20px; border-top: 1px solid #eee;
            padding-top: 15px; display: block; font-weight: 700;
            font-size: 0.85rem; cursor: pointer; text-decoration: none;
        }
        .close-sidebar { position: absolute; top: 15px; right: 20px; font-size: 1.5rem; cursor: pointer; }
            /* Refined Footer Styles */
        .site-footer {
            background-color:#5d8039; color: white; padding: 40px 15px;
            text-align: center; border-top: 5px solid #f4f1ea;
        }
        .footer-links {
            display: flex; flex-direction: row; justify-content: center;
            align-items: center; gap: 30px; margin-bottom: 25px;
        }
        .footer-icon {
            color: white; text-decoration: none; display: flex;
            flex-direction: column; align-items: center; gap: 8px;
            font-size: 0.75rem; transition: transform 0.2s; min-width: 70px;
        }
        .footer-icon i { font-size: 1.6rem; }
        .site-footer p {
            font-size: 0.7rem; opacity: 0.6; margin: 0; padding-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.1); letter-spacing: 1.5px;
        }
    </style>
</head>
<body class="account-body">

<div id="custom-modal" class="modal-overlay">
    <div class="modal-box">
        <div id="modal-icon" style="font-size: 2.5rem; margin-bottom: 15px;">🌿</div>
        <h3 id="modal-title" style="color: #5d8039; margin-bottom: 10px;">Message</h3>
        <p id="modal-text" style="color: #666; font-size: 0.95rem; line-height: 1.4;"></p>
        <div class="modal-btns" id="modal-buttons"></div>
    </div>
</div>

<header>
    <nav class="navbar">
        <div class="container">
            <div class="logo-area">
                <a href="index.html">
                    <img src="images/longlogo.png" alt="Logo" class="main-logo">
                </a>
            </div>
            <div class="menu-toggle" id="menu-toggle">
                <span></span><span></span><span></span><span></span>
            </div>

            <div class="sidebar" id="sidebar">
                <div class="close-sidebar" id="close-sidebar" style="position: absolute; top: 15px; right: 20px; font-size: 1.5rem; cursor: pointer; color: #2d5a27;">&times;</div>
                <div id="user-greeting" class="user-greeting">Hi, Guest</div>
                <ul class="sidebar-links">
                    <li><a href="index.html" style="color: #5d8039; font-weight: 700;">Home</a></li>
                    <li><a href="javascript:void(0)" onclick="protectedRedirect('plan-status.html')">Continue your plan</a></li>
                    <li><a href="javascript:void(0)" onclick="protectedRedirect('user-account.html')">My Account</a></li>
                    <li><a href="packages.html">Packages</a></li>
                    <li><a href="menu.html">Menu</a></li>
                    <li><a href="#" id="auth-btn" class="auth-btn-sidebar" onclick="handleAuthAction()">Login</a></li>
                </ul>
            </div>
        </div>
    </nav>
</header>
<main class="account-container">
    <h1 style="margin-bottom: 20px;">Welcome Back, <span id="user-display-name">...</span></h1>

    <div class="tabs">
        <button class="tab-btn active" onclick="showTab('edit-info')">Edit Info</button>
        <button class="tab-btn" onclick="showTab('order-history')">Order History</button>
    </div>

    <section id="edit-info" class="section-panel active">
        <div class="checkout-card">
            <form id="update-profile-form">
                <div class="form-group"><label>Full Name</label><input type="text" id="acc-name" required></div>
                <div class="form-group"><label>Phone Number</label><input type="tel" id="acc-phone" required></div>
                <div class="form-group"><label>Delivery Address</label><textarea id="acc-address" rows="3" required></textarea></div>
                <button type="submit" id="save-btn" class="btn-primary" style="width: 100%;">Save Changes</button>
            </form>
        </div>
    </section>

    <section id="order-history" class="section-panel">
        <div id="orders-list">
            <p style="text-align: center; color: #888;">Fetching your orders...</p>
        </div>
    </section>
</main>
<footer class="site-footer">
    <div class="footer-links">
        <a href="https://instagram.com/thegoodgreen.lb" target="_blank" class="footer-icon">
            <i class="fa-brands fa-instagram"></i><span>thegoodgreenlb</span>
        </a>
        <a href="https://wa.me/96181153917" target="_blank" class="footer-icon">
            <i class="fa-brands fa-whatsapp"></i><span>+961 81 15 39 17</span>
        </a>
        <a href="https://www.facebook.com/profile.php?id=61584124693260" target="_blank" class="footer-icon">
            <i class="fa-brands fa-facebook-f"></i><span>thegoodgreen</span>
        </a>
    </div>
    <p>&copy; 2026 THE GOOD GREEN. ALL RIGHTS RESERVED.</p>
</footer>
<script>
    // --- CONFIGURATION ---
    const sbUrl = 'https://dehcgxbupadfabotpwvg.supabase.co';
    const sbKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRlaGNneGJ1cGFkZmFib3Rwd3ZnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0MDEyNjUsImV4cCI6MjA4ODk3NzI2NX0.rXFsN9k0XYCPFf4BejbwkHvmuhvIid921jYeZmsUU6g';
    const sbClient = supabase.createClient(sbUrl, sbKey);

    let currentUser = JSON.parse(localStorage.getItem('current_user') || '{}');

    // --- GLOBAL REDIRECT & AUTH ---
    function protectedRedirect(url) {
        if (!localStorage.getItem('current_user')) {
            window.location.href = 'index.html?action=login';
        } else {
            window.location.href = url;
        }
    }

    function updateAuthUI() {
        const authBtns = document.querySelectorAll('#auth-btn');
        const greetings = document.querySelectorAll('.user-greeting');
        const user = JSON.parse(localStorage.getItem('current_user') || 'null');

        if (user) {
            const firstName = user.full_name ? user.full_name.split(' ')[0] : 'User';
            greetings.forEach(g => g.innerText = `Hi, ${firstName}`);
            authBtns.forEach(btn => {
                btn.innerText = "Logout";
                btn.style.color = "#d9534f";
            });
        }
    }

    function handleAuthAction() {
        if (localStorage.getItem('current_user')) {
            showPopup({
                title: "Logout",
                text: "Are you sure you want to log out?",
                icon: "👋",
                buttons: [
                    { text: "Logout", type: "gray", action: () => {
                        localStorage.removeItem('current_user');
                        sessionStorage.removeItem('auth_choice_made');
                        window.location.href = 'index.html';
                    }},
                    { text: "Stay", type: "green" }
                ]
            });
        } else {
            window.location.href = 'index.html?action=login';
        }
    }

    // --- SIDEBAR ENGINE ---
    const menuToggle = document.getElementById('menu-toggle');
    const sidebars = document.querySelectorAll('.sidebar');
    const closeBtns = document.querySelectorAll('.close-sidebar');

    if(menuToggle) {
        menuToggle.onclick = (e) => { 
            e.stopPropagation(); 
            sidebars.forEach(s => s.classList.add('active')); 
        };
    }

    closeBtns.forEach(btn => {
        btn.onclick = () => sidebars.forEach(s => s.classList.remove('active'));
    });

    document.onclick = (e) => {
        sidebars.forEach(s => {
            if (!s.contains(e.target) && s.classList.contains('active')) {
                s.classList.remove('active');
            }
        });
    };

    // --- TAB & MODAL LOGIC ---
    function showTab(tabId) {
        document.querySelectorAll('.section-panel').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        event.currentTarget.classList.add('active');
    }

    function showPopup({ title, text, icon = "🌿", buttons = [] }) {
        const modal = document.getElementById('custom-modal');
        document.getElementById('modal-title').innerText = title;
        document.getElementById('modal-text').innerHTML = text;
        document.getElementById('modal-icon').innerText = icon;
        
        const btnContainer = document.getElementById('modal-buttons');
        btnContainer.innerHTML = "";

        buttons.forEach(btn => {
            const b = document.createElement('button');
            b.innerText = btn.text;
            b.className = `m-btn ${btn.type === 'green' ? 'm-btn-green' : 'm-btn-gray'}`;
            b.onclick = () => {
                modal.style.display = 'none';
                if (btn.action) btn.action();
            };
            btnContainer.appendChild(b);
        });
        modal.style.display = 'flex';
    }

    // --- PROFILE & ORDERS ---
    async function loadProfile() {
        if (!currentUser.email) { window.location.href = "index.html"; return; }
        const { data } = await sbClient.from('profiles').select('*').eq('email', currentUser.email).single();
        if (data) {
            document.getElementById('user-display-name').innerText = data.full_name;
            document.getElementById('acc-name').value = data.full_name;
            document.getElementById('acc-phone').value = data.phone_number || '';
            document.getElementById('acc-address').value = data.address || '';
        }
    }

    async function loadOrders() {
        const { data: orders } = await sbClient
            .from('orders')
            .select('*, order_items(*)')
            .eq('customer_phone', currentUser.phone_number)
            .order('created_at', { ascending: false });

        const container = document.getElementById('orders-list');
        if (!orders || orders.length === 0) {
            container.innerHTML = "<p style='text-align:center; padding:20px;'>No previous orders found.</p>";
            return;
        }

        container.innerHTML = orders.map(order => `
            <div class="order-card">
                <div class="order-info">
                    <h4>${order.plan_name}</h4>
                    <p>${new Date(order.created_at).toLocaleDateString()} | $${order.total_price}</p>
                </div>
                <button class="btn-reorder" onclick='handleReorder(${JSON.stringify(order)})'>Reorder</button>
            </div>
        `).join('');
    }

    async function handleReorder(order) {
        const { data: profile } = await sbClient.from('profiles').select('plan24days, "24planweek"').eq('email', currentUser.email).single();
        const reorderState = {};
        let reviewHtml = `<div style="text-align: left; margin-top: 15px; border-top: 1px solid #eee; padding-top: 10px;">`;

        order.order_items.forEach(item => {
            if (!reorderState[item.day_number]) reorderState[item.day_number] = [];
            reorderState[item.day_number].push({
                name: item.meal_name,
                selectedChoices: item.choice ? item.choice.split(', ') : [],
                removedIngredients: item.removed_ingredients ? item.removed_ingredients.split(', ') : [],
                instructions: item.special_instructions || ""
            });

            reviewHtml += `
                <div style="margin-bottom: 12px; font-size: 0.85rem;">
                    <strong style="color: #5d8039;">Day ${item.day_number}: ${item.meal_name}</strong><br>
                    <span style="color: #666;">Choices: ${item.choice || 'None'}</span><br>
                    ${item.removed_ingredients ? `<span style="color: #d9534f;">✕ Remove: ${item.removed_ingredients}</span><br>` : ''}
                </div>`;
        });

        localStorage.setItem('finalOrder', JSON.stringify(reorderState));
        const dayCount = Object.keys(reorderState).length;

        showPopup({
            title: "Review Order",
            text: "Please confirm your selections:" + reviewHtml + "</div>", 
            icon: "📋",
            buttons: [
                { 
                    text: "Confirm & Proceed", 
                    type: "green", 
                    action: () => {
                        const isSub = (profile?.plan24days === true && dayCount === 6);
                        window.location.href = `checkout.html?days=${dayCount}${isSub ? '&isSub=true' : ''}`;
                    } 
                },
                { text: "Cancel", type: "gray" }
            ]
        });
    }

    window.onload = () => { 
        updateAuthUI();
        loadProfile(); 
        loadOrders(); 
    };
</script>
</body>
</html>
